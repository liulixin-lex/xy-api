name: Sync Release to Gitee

permissions:
  contents: read

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release Tag to sync (e.g. v1.0.0)'
        required: true
        type: string

env:
  GITEE_OWNER: ${{ vars.GITEE_OWNER }}
  GITEE_REPO: ${{ vars.GITEE_REPO }}

jobs:
  sync-to-gitee:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Validate Gitee target
        env:
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          set -euo pipefail
          if [ -z "$GITEE_OWNER" ] || [ -z "$GITEE_REPO" ]; then
            echo "::error::Set repository variables GITEE_OWNER and GITEE_REPO before syncing to Gitee."
            exit 1
          fi
          if [[ ! "$TAG_NAME" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo '::error::Only stable lowercase v semantic-version releases can be synced.'
            exit 1
          fi

      - name: Get Release Info
        id: release_info
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.event.inputs.tag_name }}
        run: |
          set -euo pipefail
          RELEASE_INFO=$(gh release view "$TAG_NAME" \
            --json name,body,tagName,isDraft,isPrerelease,assets)
          if ! jq --exit-status \
            --arg tag "$TAG_NAME" \
            '.tagName == $tag and
             .isDraft == false and
             .isPrerelease == false and
             ([.assets[].name] as $names |
               ($names | length) > 0 and
               ($names | length) == ($names | unique | length) and
               all($names[]; test("^[^/\\r\\n]+$")))' \
            <<<"$RELEASE_INFO" >/dev/null; then
            echo '::error::Only an exact public stable GitHub Release with a safe non-empty asset inventory can be synchronized.'
            exit 1
          fi

          RELEASE_NAME=$(jq -r '.name' <<<"$RELEASE_INFO")
          if [ -z "$RELEASE_NAME" ]; then
            RELEASE_NAME=$TAG_NAME
          fi
          if [[ "$RELEASE_NAME" == *$'\n'* || "$RELEASE_NAME" == *$'\r'* ]]; then
            echo '::error::Release names containing line breaks cannot be synchronized safely.'
            exit 1
          fi

          git fetch --force origin "refs/tags/$TAG_NAME:refs/tags/$TAG_NAME"
          TARGET_COMMITISH=$(git rev-parse "refs/tags/$TAG_NAME^{commit}")
          if ! [[ "$TARGET_COMMITISH" =~ ^[0-9a-f]{40}$ ]]; then
            echo '::error::Unable to resolve the release tag to an exact commit.'
            exit 1
          fi
          delimiter="release_body_$(python3 -c 'import secrets; print(secrets.token_hex(24))')"

          {
            printf 'release_name=%s\n' "$RELEASE_NAME"
            printf 'target_commitish=%s\n' "$TARGET_COMMITISH"
            printf 'release_body<<%s\n' "$delimiter"
            jq -r '.body' <<<"$RELEASE_INFO"
            printf '%s\n' "$delimiter"
          } >>"$GITHUB_OUTPUT"

          asset_count=$(jq '.assets | length' <<<"$RELEASE_INFO")
          install -d -m 0700 release_assets
          gh release download "$TAG_NAME" --dir ./release_assets
          actual_asset_count=$(find release_assets -mindepth 1 -maxdepth 1 -type f | wc -l)
          if [ "$actual_asset_count" -ne "$asset_count" ] || \
             ! diff -u \
               <(jq --raw-output '.assets[].name' <<<"$RELEASE_INFO" | sort) \
               <(find release_assets -mindepth 1 -maxdepth 1 -type f -printf '%f\n' | sort); then
            echo '::error::Downloaded GitHub Release assets do not match the authoritative inventory.'
            exit 1
          fi

      - name: Create Gitee Release
        id: create_release
        uses: nICEnnnnnnnLee/action-gitee-release@44b412edade0c837fb0ad7d73f4674ec07c8b722 # v2.0.0
        with:
          gitee_action: create_release
          gitee_owner: ${{ env.GITEE_OWNER }}
          gitee_repo: ${{ env.GITEE_REPO }}
          gitee_token: ${{ secrets.GITEE_TOKEN }}
          gitee_tag_name: ${{ github.event.inputs.tag_name }}
          gitee_release_name: ${{ steps.release_info.outputs.release_name }}
          gitee_release_body: ${{ steps.release_info.outputs.release_body }}
          gitee_target_commitish: ${{ steps.release_info.outputs.target_commitish }}

      - name: Upload Assets to Gitee
        if: hashFiles('release_assets/*') != ''
        uses: nICEnnnnnnnLee/action-gitee-release@44b412edade0c837fb0ad7d73f4674ec07c8b722 # v2.0.0
        with:
          gitee_action: upload_asset
          gitee_owner: ${{ env.GITEE_OWNER }}
          gitee_repo: ${{ env.GITEE_REPO }}
          gitee_token: ${{ secrets.GITEE_TOKEN }}
          gitee_release_id: ${{ steps.create_release.outputs.release-id }}
          gitee_upload_retry_times: 3
          gitee_files: |
            release_assets/*

      - name: Cleanup
        if: always()
        run: |
          rm -rf release_assets/

      - name: Summary
        if: success()
        env:
          TAG_NAME: ${{ inputs.tag_name }}
        run: |
          printf '✅ Successfully synced release %s to Gitee!\n' "$TAG_NAME"
          printf '🔗 Gitee Release URL: https://gitee.com/%s/%s/releases/tag/%s\n' \
            "$GITEE_OWNER" "$GITEE_REPO" "$TAG_NAME"
