name: Build Electron App

on:
  push:
    tags:
      - 'v*'  # Triggers on stable version tags like v1.0.0
      - '!v*-*'  # Ignore pre-release tags like v1.0.0-beta

env:
  RELEASE_TAG: ${{ github.ref_name }}

jobs:
  build:
    timeout-minutes: 60
    permissions:
      contents: read
    strategy:
      matrix:
        # os: [macos-latest, windows-latest]
        os: [windows-latest]

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Determine Version
        run: |
          VERSION="$RELEASE_TAG"
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Electron release version must use lowercase v semver, for example v0.0.1. Current value: $VERSION"
            exit 1
          fi
          REPOSITORY_VERSION=$(< VERSION)
          if [[ "$REPOSITORY_VERSION" != "$VERSION" ]]; then
            echo "::error::Release tag $VERSION does not match the checked-out VERSION file ($REPOSITORY_VERSION)."
            exit 1
          fi
          if [ "$(git rev-parse HEAD)" != "$GITHUB_SHA" ]; then
            echo '::error::Electron checkout does not match the tag-push event commit.'
            exit 1
          fi
          git fetch --force origin "refs/tags/$VERSION:refs/tags/$VERSION"
          tag_commit=$(git rev-parse "refs/tags/$VERSION^{commit}")
          if [ "$tag_commit" != "$GITHUB_SHA" ]; then
            echo '::error::The Electron release tag no longer resolves to the tag-push event commit.'
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Install verified Bun
        shell: bash
        run: scripts/release/install-bun.sh

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22.23.1'

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.5'

      - name: Build frontend
        env:
          CI: ""
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          cd web
          bun install --frozen-lockfile
          cd default
          DISABLE_ESLINT_PLUGIN='true' VITE_REACT_APP_VERSION=$VERSION bun --bun run build
          cd ../classic
          VITE_REACT_APP_VERSION=$VERSION bun --bun run build
          cd ../..

      # - name: Build Go binary (macos/Linux)
      #   if: runner.os != 'Windows'
      #   run: |
      #     go mod download
      #     go build -ldflags "-s -w -X 'github.com/QuantumNous/new-api/common.Version=$VERSION' -extldflags '-static'" -o new-api

      - name: Build Go binary (Windows)
        if: runner.os == 'Windows'
        run: |
          set -euo pipefail
          go mod download
          CGO_ENABLED=0 GOEXPERIMENT=greenteagc GOOS=windows GOARCH=amd64 \
            go build \
              -trimpath \
              -ldflags "-s -w -X 'github.com/QuantumNous/new-api/common.Version=$VERSION'" \
              -o new-api.exe
          reported_version=$(./new-api.exe --version | tr -d '\r')
          [ "$reported_version" = "$VERSION" ]

      # - name: Build Electron app (macOS)
      #   if: runner.os == 'macOS'
      #   run: |
      #     cd electron
      #     npm run build:mac
      #   env:
      #     CSC_IDENTITY_AUTO_DISCOVERY: false  # Skip code signing

      - name: Build Electron app (Windows)
        if: runner.os == 'Windows'
        run: scripts/release/build-electron-windows.sh "$VERSION"

      # - name: Upload artifacts (macOS)
      #   if: runner.os == 'macOS'
      #   uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
      #   with:
      #     name: macos-build
      #     path: |
      #       electron/dist/*.dmg
      #       electron/dist/*.zip

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: windows-build
          path: |
            electron/dist/*.exe
            electron/dist/checksums-electron-windows.txt

  release:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 70
    if: startsWith(github.ref, 'refs/tags/')
    concurrency:
      group: electron-stage-${{ github.ref_name }}
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0

      - name: Wait for the release workflow to create the private draft
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          error_file=$(mktemp)
          trap 'rm -f "$error_file"' EXIT
          for _ in $(seq 1 360); do
            : >"$error_file"
            if release_json=$(gh api "/repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}" 2>"$error_file"); then
              if [ "$(jq --raw-output '.draft' <<<"$release_json")" != true ]; then
                echo '::error::Electron assets can only be added while the release is still a draft.'
                exit 1
              fi
              echo 'The private release draft is ready for Electron assets.'
              exit 0
            fi
            if ! grep --quiet 'HTTP 404' "$error_file"; then
              cat "$error_file" >&2
              exit 1
            fi
            sleep 10
          done
          echo '::error::Timed out waiting for the release workflow to create a private draft.'
          exit 1

      - name: Validate any resumable Electron assets before upload
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          release_json=$(gh api "/repos/${GITHUB_REPOSITORY}/releases/tags/${RELEASE_TAG}")
          if [ "$(jq --raw-output '.draft' <<<"$release_json")" != true ]; then
            echo '::error::Electron assets can only be resumed while the release is a draft.'
            exit 1
          fi

          desktop_version=${RELEASE_TAG#v}
          expected_assets=(
            "New-API-App.${desktop_version}.exe"
            "New-API-App.Setup.${desktop_version}.exe"
            checksums-electron-windows.txt
          )
          for asset_name in "${expected_assets[@]}"; do
            if [ ! -f "windows-build/$asset_name" ]; then
              echo "::error::Missing Electron build artifact: $asset_name"
              exit 1
            fi
          done

          existing_directory=$(mktemp -d)
          trap 'rm -rf "$existing_directory"' EXIT
          for asset_name in "${expected_assets[@]}"; do
            if ! jq --exit-status --arg name "$asset_name" \
              '.assets | any(.name == $name)' <<<"$release_json" >/dev/null; then
              continue
            fi
            gh release download "$RELEASE_TAG" \
              --dir "$existing_directory" \
              --pattern "$asset_name"
            if ! cmp -s \
              "windows-build/$asset_name" \
              "$existing_directory/$asset_name"; then
              echo "::error::Existing draft Electron asset differs from this tag build: $asset_name"
              exit 1
            fi
          done

      - name: Upload to Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          draft: true
          overwrite_files: false
          fail_on_unmatched_files: true
          files: |
            windows-build/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
