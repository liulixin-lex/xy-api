name: Build Electron App

permissions:
  contents: read

on:
  push:
    tags:
      - 'v*'  # Triggers on stable version tags like v1.0.0
      - '!v*-*'  # Ignore pre-release tags like v1.0.0-beta
  workflow_dispatch:  # Allows manual triggering
    inputs:
      tag:
        description: 'Release tag to build (e.g., v0.0.1)'
        required: true
        type: string
      confirm_tag:
        description: 'Type the same tag again to confirm this stable release'
        required: true
        type: string

concurrency:
  group: stable-electron-release-${{ github.repository }}-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  RELEASE_REF: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

jobs:
  prepare:
    name: Validate stable release source
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      tag: ${{ steps.release.outputs.tag }}
      sha: ${{ steps.release.outputs.sha }}
    permissions:
      contents: read
    steps:
      - name: Validate release request
        env:
          CONFIRM_TAG: ${{ inputs.confirm_tag }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          WORKFLOW_REF: ${{ github.ref }}
        run: |
          set -euo pipefail
          if [[ ! "$RELEASE_TAG" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::Stable Electron tags must use lowercase v semver. Current value: $RELEASE_TAG"
            exit 1
          fi
          if [ "$GITHUB_EVENT_NAME" = 'workflow_dispatch' ] && [ "$CONFIRM_TAG" != "$RELEASE_TAG" ]; then
            echo '::error::confirm_tag must exactly match tag before publishing Electron assets.'
            exit 1
          fi
          if [ "$GITHUB_EVENT_NAME" = 'workflow_dispatch' ] && [ "$WORKFLOW_REF" != "refs/heads/${DEFAULT_BRANCH}" ]; then
            echo "::error::Manual stable releases must run from the default branch (${DEFAULT_BRANCH})."
            exit 1
          fi

      - name: Check out release tag
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ env.RELEASE_REF }}
          fetch-depth: 0

      - name: Validate tag, VERSION, and main ancestry
        id: release
        run: |
          set -euo pipefail
          if ! cmp -s VERSION <(printf '%s\n' "$RELEASE_TAG"); then
            echo "::error::VERSION must contain exactly $RELEASE_TAG followed by one newline."
            exit 1
          fi

          release_sha=$(git rev-parse HEAD)
          tag_sha=$(git rev-list -n 1 "refs/tags/$RELEASE_TAG")
          if [ "$tag_sha" != "$release_sha" ]; then
            echo "::error::Tag $RELEASE_TAG does not resolve to the checked-out commit."
            exit 1
          fi
          git fetch --no-tags origin main
          if ! git merge-base --is-ancestor "$release_sha" origin/main; then
            echo "::error::Release commit $release_sha is not an ancestor of origin/main."
            exit 1
          fi

          echo "tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "sha=$release_sha" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      matrix:
        # os: [macos-latest, windows-latest]
        os: [windows-latest]

    runs-on: ${{ matrix.os }}
    timeout-minutes: 90
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 1

      - name: Determine Version
        run: |
          VERSION="${{ needs.prepare.outputs.tag }}"
          if [[ ! "$VERSION" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::Electron release version must use lowercase v semver, for example v0.0.1. Current value: $VERSION"
            exit 1
          fi
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: '1.3.14'

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.1'

      - name: Build frontend
        env:
          CI: ""
          NODE_OPTIONS: "--max-old-space-size=4096"
        run: |
          cd web
          bun install --frozen-lockfile
          cd default
          DISABLE_ESLINT_PLUGIN='true' VITE_REACT_APP_VERSION=$VERSION bun run build
          cd ../classic
          VITE_REACT_APP_VERSION=$VERSION bun run build
          cd ../..

      # - name: Build Go binary (macos/Linux)
      #   if: runner.os != 'Windows'
      #   run: |
      #     go mod download
      #     go build -ldflags "-s -w -X 'github.com/QuantumNous/new-api/common.Version=$VERSION' -extldflags '-static'" -o new-api

      - name: Build Go binary (Windows)
        if: runner.os == 'Windows'
        run: |
          go mod download
          CGO_ENABLED=0 GOEXPERIMENT=greenteagc GOOS=windows GOARCH=amd64 go build -ldflags "-s -w -X 'github.com/QuantumNous/new-api/common.Version=$VERSION'" -o new-api.exe

      - name: Update Electron version
        run: |
          cd electron
          VERSION=${VERSION#v}  # Remove 'v' prefix if present
          # Convert to valid semver: take first 3 components and convert rest to prerelease format
          # e.g., 0.9.3-patch.1 -> 0.9.3-patch.1
          if [[ $VERSION =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)(.*)$ ]]; then
            MAJOR=${BASH_REMATCH[1]}
            MINOR=${BASH_REMATCH[2]}
            PATCH=${BASH_REMATCH[3]}
            REST=${BASH_REMATCH[4]}

            VERSION="$MAJOR.$MINOR.$PATCH"

            # If there's extra content, append it without adding -dev
            if [[ -n "$REST" ]]; then
              VERSION="$VERSION$REST"
            fi
          fi
          npm version "$VERSION" --no-git-tag-version --allow-same-version

      - name: Install Electron dependencies
        run: |
          cd electron
          npm ci

      # - name: Build Electron app (macOS)
      #   if: runner.os == 'macOS'
      #   run: |
      #     cd electron
      #     npm run build:mac
      #   env:
      #     CSC_IDENTITY_AUTO_DISCOVERY: false  # Skip code signing

      - name: Build Electron app (Windows)
        if: runner.os == 'Windows'
        run: |
          cd electron
          npm run build:win

      - name: Generate Electron checksums
        if: runner.os == 'Windows'
        run: |
          cd electron/dist
          sha256sum ./*.exe > checksums-electron-windows.txt

      # - name: Upload artifacts (macOS)
      #   if: runner.os == 'macOS'
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: macos-build
      #     path: |
      #       electron/dist/*.dmg
      #       electron/dist/*.zip

      - name: Upload artifacts (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: windows-build
          path: |
            electron/dist/*.exe
            electron/dist/checksums-electron-windows.txt
          if-no-files-found: error
          overwrite: true

  release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    concurrency:
      group: stable-github-release-${{ github.repository }}
      cancel-in-progress: false
    permissions:
      contents: write

    steps:
      - name: Check out validated release commit
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 1

      - name: Download all artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0

      - name: Revalidate release tag
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          git fetch --force origin "refs/tags/${TAG}:refs/tags/${TAG}"
          current_tag_sha=$(git rev-list -n 1 "refs/tags/${TAG}")
          if [ "$current_tag_sha" != '${{ needs.prepare.outputs.sha }}' ]; then
            echo "::error::Release tag $TAG moved during the build; refusing Electron asset upload."
            exit 1
          fi

      - name: Verify Electron asset inventory and checksums
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          version=${TAG#v}
          expected_file="$RUNNER_TEMP/electron-assets-expected.txt"
          actual_file="$RUNNER_TEMP/electron-assets-actual.txt"
          printf '%s\n' \
            "New-API-App.${version}.exe" \
            "New-API-App.Setup.${version}.exe" \
            checksums-electron-windows.txt | LC_ALL=C sort > "$expected_file"
          find windows-build -mindepth 1 -maxdepth 1 -type f -printf '%f\n' | LC_ALL=C sort > "$actual_file"
          if ! cmp -s "$expected_file" "$actual_file"; then
            echo '::error::Electron artifact inventory does not match the expected stable assets.'
            diff -u "$expected_file" "$actual_file" || true
            exit 1
          fi
          (cd windows-build && sha256sum --check --strict checksums-electron-windows.txt)

      - name: Prepare immutable Electron asset upload
        id: release_assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          .github/scripts/prepare-release-assets.sh \
            --tag "$TAG" \
            --source-dir windows-build \
            --upload-dir "$RUNNER_TEMP/release-assets-upload" \
            --output "$GITHUB_OUTPUT"

      - name: Upload to Release
        if: steps.release_assets.outputs.upload_required == 'true'
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag }}
          fail_on_unmatched_files: true
          overwrite_files: false
          make_latest: ${{ steps.release_assets.outputs.make_latest }}
          files: |
            ${{ runner.temp }}/release-assets-upload/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
