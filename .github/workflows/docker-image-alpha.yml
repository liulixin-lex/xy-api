name: Publish Docker image (alpha)

on:
  push:
    branches:
      - alpha
  workflow_dispatch:
    inputs:
      name:
        description: "reason"
        required: false

concurrency:
  group: docker-alpha-publication
  cancel-in-progress: false

jobs:
  prepare_version:
    name: Prepare alpha version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    permissions:
      contents: read
    steps:
      - name: Check out (shallow)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Determine alpha version
        id: version
        run: |
          VERSION="alpha-$(date +'%Y%m%d')-$(git rev-parse --short HEAD)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Prepared alpha version: $VERSION"

  build_single_arch:
    name: Build & push (${{ matrix.arch }}) [native]
    needs: prepare_version
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_REPOSITORY: ${{ vars.DOCKERHUB_REPOSITORY }}
    permissions:
      packages: write
      contents: read
      id-token: write
    steps:
      - name: Check out (shallow)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1

      - name: Determine alpha version
        id: version
        run: |
          VERSION="${{ needs.prepare_version.outputs.version }}"
          echo "$VERSION" > VERSION
          echo "value=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "Publishing version: $VERSION for ${{ matrix.arch }}"

      - name: Normalize GHCR repository
        run: echo "GHCR_REPOSITORY=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Install verified Docker Buildx
        run: scripts/release/install-buildx.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          driver-opts: image=moby/buildkit:v0.31.2@sha256:2f5adac4ecd194d9f8c10b7b5d7bceb5186853db1b26e5abd3a657af0b7e26ec

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' && env.DOCKERHUB_REPOSITORY != ''
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Extract metadata (labels)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: |
            ghcr.io/${{ env.GHCR_REPOSITORY }}

      - name: Prepare image tags
        id: tags
        run: |
          {
            echo "tags<<EOF"
            echo "ghcr.io/${GHCR_REPOSITORY}:alpha-${{ matrix.arch }}"
            echo "ghcr.io/${GHCR_REPOSITORY}:${{ steps.version.outputs.value }}-${{ matrix.arch }}"
            if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ] && [ -n "$DOCKERHUB_REPOSITORY" ]; then
              echo "${DOCKERHUB_REPOSITORY}:alpha-${{ matrix.arch }}"
              echo "${DOCKERHUB_REPOSITORY}:${{ steps.version.outputs.value }}-${{ matrix.arch }}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build & push single-arch
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILDPLATFORM=${{ matrix.platform }}
            TARGETOS=linux
            TARGETARCH=${{ matrix.arch }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Run native startup and version smoke
        run: |
          set -euo pipefail
          scripts/release/smoke-image.sh \
            "ghcr.io/${GHCR_REPOSITORY}@${{ steps.build.outputs.digest }}" \
            "${{ steps.version.outputs.value }}" \
            "${{ matrix.arch }}"

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
        with:
          cosign-release: v2.5.2

      - name: Sign image with cosign
        run: |
          cosign sign --yes ghcr.io/${{ env.GHCR_REPOSITORY }}@${{ steps.build.outputs.digest }}
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ] && [ -n "$DOCKERHUB_REPOSITORY" ]; then
            cosign sign --yes ${DOCKERHUB_REPOSITORY}@${{ steps.build.outputs.digest }}
          fi

      - name: Output digest
        run: |
          echo "### Docker Image Digest (${{ matrix.arch }})" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "ghcr.io/${{ env.GHCR_REPOSITORY }}:alpha-${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ] && [ -n "$DOCKERHUB_REPOSITORY" ]; then
            echo "${DOCKERHUB_REPOSITORY}:alpha-${{ matrix.arch }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "${{ steps.build.outputs.digest }}" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  create_manifests:
    name: Create multi-arch manifests
    needs: [prepare_version, build_single_arch]
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_REPOSITORY: ${{ vars.DOCKERHUB_REPOSITORY }}
    permissions:
      packages: write
      contents: read
    steps:
      - name: Check out release tooling
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - name: Normalize GHCR repository
        run: echo "GHCR_REPOSITORY=${GITHUB_REPOSITORY,,}" >> $GITHUB_ENV

      - name: Install verified Docker Buildx
        run: scripts/release/install-buildx.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          driver-opts: image=moby/buildkit:v0.31.2@sha256:2f5adac4ecd194d9f8c10b7b5d7bceb5186853db1b26e5abd3a657af0b7e26ec

      - name: Set alpha version
        run: |
          VERSION="${{ needs.prepare_version.outputs.version }}"
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' && env.DOCKERHUB_REPOSITORY != ''
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Create & push manifest (Docker Hub - alpha)
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' && env.DOCKERHUB_REPOSITORY != ''
        run: |
          docker buildx imagetools create \
            -t "${DOCKERHUB_REPOSITORY}:alpha" \
            "${DOCKERHUB_REPOSITORY}:${VERSION}-amd64" \
            "${DOCKERHUB_REPOSITORY}:${VERSION}-arm64"

      - name: Create & push manifest (Docker Hub - versioned alpha)
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' && env.DOCKERHUB_REPOSITORY != ''
        run: |
          docker buildx imagetools create \
            -t "${DOCKERHUB_REPOSITORY}:${VERSION}" \
            "${DOCKERHUB_REPOSITORY}:${VERSION}-amd64" \
            "${DOCKERHUB_REPOSITORY}:${VERSION}-arm64"

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Create & push manifest (GHCR - alpha)
        run: |
          docker buildx imagetools create \
            -t "ghcr.io/${GHCR_REPOSITORY}:alpha" \
            "ghcr.io/${GHCR_REPOSITORY}:${VERSION}-amd64" \
            "ghcr.io/${GHCR_REPOSITORY}:${VERSION}-arm64"

      - name: Create & push manifest (GHCR - versioned alpha)
        run: |
          docker buildx imagetools create \
            -t "ghcr.io/${GHCR_REPOSITORY}:${VERSION}" \
            "ghcr.io/${GHCR_REPOSITORY}:${VERSION}-amd64" \
            "ghcr.io/${GHCR_REPOSITORY}:${VERSION}-arm64"

      - name: Output manifest digest
        run: |
          echo "### Multi-arch Manifest Digests" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          docker buildx imagetools inspect ghcr.io/${GHCR_REPOSITORY}:alpha >> $GITHUB_STEP_SUMMARY
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ] && [ -n "$DOCKERHUB_REPOSITORY" ]; then
            echo "---" >> $GITHUB_STEP_SUMMARY
            docker buildx imagetools inspect ${DOCKERHUB_REPOSITORY}:alpha >> $GITHUB_STEP_SUMMARY
          fi
          echo '```' >> $GITHUB_STEP_SUMMARY
