name: Publish Docker image (manual branch)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch name to build, for example alpha or nightly'
        required: true
        type: string

concurrency:
  group: docker-manual-branch-${{ inputs.branch }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare Docker tags
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.version.outputs.branch }}
      sha: ${{ steps.version.outputs.sha }}
      tag_prefix: ${{ steps.version.outputs.tag_prefix }}
      version: ${{ steps.version.outputs.version }}
    permissions:
      contents: read
    steps:
      - name: Check out branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
          ref: main

      - name: Resolve Docker tags
        id: version
        env:
          BRANCH_NAME: ${{ inputs.branch }}
        run: |
          set -euo pipefail
          if ! git check-ref-format --branch "$BRANCH_NAME" >/dev/null; then
            echo "::error::Invalid branch name: $BRANCH_NAME"
            exit 1
          fi
          git fetch --no-tags origin \
            "+refs/heads/${BRANCH_NAME}:refs/remotes/origin/manual-image-source"
          SHA=$(git rev-parse 'refs/remotes/origin/manual-image-source^{commit}')

          sanitized_branch=$(printf '%s' "$BRANCH_NAME" | \
            tr '[:upper:]' '[:lower:]' | \
            sed -E 's/[^a-z0-9_.-]+/-/g; s/^[.-]+//; s/[.-]+$//')
          sanitized_branch=${sanitized_branch:0:70}
          sanitized_branch=$(printf '%s' "$sanitized_branch" | sed -E 's/[.-]+$//')
          if [ -z "$sanitized_branch" ]; then
            echo "::error::Branch '$BRANCH_NAME' cannot be converted to a valid Docker tag prefix"
            exit 1
          fi
          branch_hash=$(printf '%s' "$BRANCH_NAME" | sha256sum | cut -c1-8)
          TAG_PREFIX="branch-${sanitized_branch}-${branch_hash}"

          SHORT_SHA=${SHA:0:7}
          VERSION="${TAG_PREFIX}-$(date +'%Y%m%d')-${SHORT_SHA}"

          echo "branch=$BRANCH_NAME" >> "$GITHUB_OUTPUT"
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"
          echo "tag_prefix=$TAG_PREFIX" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Prepared Docker tags for $BRANCH_NAME at $SHORT_SHA"

  build_single_arch:
    name: Build & push (${{ matrix.arch }})
    needs: [prepare]
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_REPOSITORY: ${{ vars.DOCKERHUB_REPOSITORY }}
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Check out branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 1
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Write VERSION
        run: |
          echo "${{ needs.prepare.outputs.version }}" > VERSION
          echo "Publishing version: ${{ needs.prepare.outputs.version }} for ${{ matrix.arch }}"

      - name: Normalize GHCR repository
        run: echo "GHCR_REPOSITORY=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Install verified Docker Buildx
        run: scripts/release/install-buildx.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          driver-opts: image=moby/buildkit:v0.31.2@sha256:2f5adac4ecd194d9f8c10b7b5d7bceb5186853db1b26e5abd3a657af0b7e26ec

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' && env.DOCKERHUB_REPOSITORY != ''
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: |
            ghcr.io/${{ env.GHCR_REPOSITORY }}

      - name: Prepare image tags
        id: tags
        run: |
          {
            echo "tags<<EOF"
            echo "ghcr.io/${GHCR_REPOSITORY}:${{ needs.prepare.outputs.tag_prefix }}-${{ matrix.arch }}"
            echo "ghcr.io/${GHCR_REPOSITORY}:${{ needs.prepare.outputs.version }}-${{ matrix.arch }}"
            if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ] && [ -n "$DOCKERHUB_REPOSITORY" ]; then
              echo "${DOCKERHUB_REPOSITORY}:${{ needs.prepare.outputs.tag_prefix }}-${{ matrix.arch }}"
              echo "${DOCKERHUB_REPOSITORY}:${{ needs.prepare.outputs.version }}-${{ matrix.arch }}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build & push
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
        with:
          cosign-release: v2.5.2

      - name: Sign image with cosign
        run: |
          cosign sign --yes ghcr.io/${GHCR_REPOSITORY}@${{ steps.build.outputs.digest }}
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ] && [ -n "$DOCKERHUB_REPOSITORY" ]; then
            cosign sign --yes ${DOCKERHUB_REPOSITORY}@${{ steps.build.outputs.digest }}
          fi

      - name: Image summary
        run: |
          echo "### Docker Image Digest (${{ matrix.arch }})" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "ghcr.io/${GHCR_REPOSITORY}:${{ needs.prepare.outputs.tag_prefix }}-${{ matrix.arch }}" >> "$GITHUB_STEP_SUMMARY"
          echo "ghcr.io/${GHCR_REPOSITORY}:${{ needs.prepare.outputs.version }}-${{ matrix.arch }}" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ] && [ -n "$DOCKERHUB_REPOSITORY" ]; then
            echo "${DOCKERHUB_REPOSITORY}:${{ needs.prepare.outputs.tag_prefix }}-${{ matrix.arch }}" >> "$GITHUB_STEP_SUMMARY"
            echo "${DOCKERHUB_REPOSITORY}:${{ needs.prepare.outputs.version }}-${{ matrix.arch }}" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "${{ steps.build.outputs.digest }}" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

  create_manifests:
    name: Create multi-arch manifests
    needs: [prepare, build_single_arch]
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_REPOSITORY: ${{ vars.DOCKERHUB_REPOSITORY }}
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Check out release tooling
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 1

      - name: Normalize GHCR repository
        run: echo "GHCR_REPOSITORY=${GITHUB_REPOSITORY,,}" >> "$GITHUB_ENV"

      - name: Install verified Docker Buildx
        run: scripts/release/install-buildx.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          driver-opts: image=moby/buildkit:v0.31.2@sha256:2f5adac4ecd194d9f8c10b7b5d7bceb5186853db1b26e5abd3a657af0b7e26ec

      - name: Log in to Docker Hub
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' && env.DOCKERHUB_REPOSITORY != ''
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN || secrets.GITHUB_TOKEN }}

      - name: Create & push manifest (GHCR branch)
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${GHCR_REPOSITORY}:${{ needs.prepare.outputs.tag_prefix }} \
            ghcr.io/${GHCR_REPOSITORY}:${{ needs.prepare.outputs.version }}-amd64 \
            ghcr.io/${GHCR_REPOSITORY}:${{ needs.prepare.outputs.version }}-arm64

      - name: Create & push manifest (GHCR versioned)
        run: |
          docker buildx imagetools create \
            -t ghcr.io/${GHCR_REPOSITORY}:${{ needs.prepare.outputs.version }} \
            ghcr.io/${GHCR_REPOSITORY}:${{ needs.prepare.outputs.version }}-amd64 \
            ghcr.io/${GHCR_REPOSITORY}:${{ needs.prepare.outputs.version }}-arm64

      - name: Create & push manifest (Docker Hub branch)
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' && env.DOCKERHUB_REPOSITORY != ''
        run: |
          docker buildx imagetools create \
            -t ${DOCKERHUB_REPOSITORY}:${{ needs.prepare.outputs.tag_prefix }} \
            ${DOCKERHUB_REPOSITORY}:${{ needs.prepare.outputs.version }}-amd64 \
            ${DOCKERHUB_REPOSITORY}:${{ needs.prepare.outputs.version }}-arm64

      - name: Create & push manifest (Docker Hub versioned)
        if: env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != '' && env.DOCKERHUB_REPOSITORY != ''
        run: |
          docker buildx imagetools create \
            -t ${DOCKERHUB_REPOSITORY}:${{ needs.prepare.outputs.version }} \
            ${DOCKERHUB_REPOSITORY}:${{ needs.prepare.outputs.version }}-amd64 \
            ${DOCKERHUB_REPOSITORY}:${{ needs.prepare.outputs.version }}-arm64

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
        with:
          cosign-release: v2.5.2

      - name: Sign manifests with cosign
        run: |
          cosign sign --yes ghcr.io/${GHCR_REPOSITORY}:${{ needs.prepare.outputs.tag_prefix }}
          cosign sign --yes ghcr.io/${GHCR_REPOSITORY}:${{ needs.prepare.outputs.version }}
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ] && [ -n "$DOCKERHUB_REPOSITORY" ]; then
            cosign sign --yes ${DOCKERHUB_REPOSITORY}:${{ needs.prepare.outputs.tag_prefix }}
            cosign sign --yes ${DOCKERHUB_REPOSITORY}:${{ needs.prepare.outputs.version }}
          fi

      - name: Manifest summary
        run: |
          echo "### Multi-arch Manifest Digests" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          docker buildx imagetools inspect ghcr.io/${GHCR_REPOSITORY}:${{ needs.prepare.outputs.tag_prefix }} >> "$GITHUB_STEP_SUMMARY"
          echo "---" >> "$GITHUB_STEP_SUMMARY"
          docker buildx imagetools inspect ghcr.io/${GHCR_REPOSITORY}:${{ needs.prepare.outputs.version }} >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ] && [ -n "$DOCKERHUB_REPOSITORY" ]; then
            echo "---" >> "$GITHUB_STEP_SUMMARY"
            docker buildx imagetools inspect ${DOCKERHUB_REPOSITORY}:${{ needs.prepare.outputs.tag_prefix }} >> "$GITHUB_STEP_SUMMARY"
            echo "---" >> "$GITHUB_STEP_SUMMARY"
            docker buildx imagetools inspect ${DOCKERHUB_REPOSITORY}:${{ needs.prepare.outputs.version }} >> "$GITHUB_STEP_SUMMARY"
          fi
          echo '```' >> "$GITHUB_STEP_SUMMARY"
