name: Build Check

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.1'
          cache: true

      - name: Prepare embedded frontend placeholders
        run: |
          mkdir -p web/default/dist web/classic/dist
          printf '<!doctype html><html><head><title>ci</title></head><body>ci placeholder</body></html>' > web/default/dist/index.html
          printf '<!doctype html><html><head><title>ci</title></head><body>ci placeholder</body></html>' > web/classic/dist/index.html

      - name: Run backend tests
        run: go test ./...

  frontend-default:
    name: Default frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: '1.3.14'

      - name: Install frontend dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Typecheck default frontend
        working-directory: web/default
        run: bun run typecheck

      - name: Build default frontend
        working-directory: web/default
        env:
          DISABLE_ESLINT_PLUGIN: 'true'
        run: VITE_REACT_APP_VERSION=$(cat ../../VERSION) bun run build

  frontend-classic:
    name: Classic frontend build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: '1.3.14'

      - name: Install frontend dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Build classic frontend
        working-directory: web/classic
        run: VITE_REACT_APP_VERSION=$(cat ../../VERSION) bun run build
