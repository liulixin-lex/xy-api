name: Build Check

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
      - support/v0.1
  push:
    branches:
      - main
      - support/v0.1
  workflow_dispatch:

jobs:
  workflow-lint:
    name: Workflow supply-chain checks
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install pinned workflow linters
        run: |
          set -euo pipefail
          archive="$RUNNER_TEMP/actionlint.tar.gz"
          curl --fail --silent --show-error --location \
            --proto '=https' --tlsv1.2 \
            --retry 3 --retry-all-errors \
            'https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz' \
            --output "$archive"
          printf '%s  %s\n' \
            '8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8' \
            "$archive" | sha256sum --check --strict
          tar -xzf "$archive" -C "$RUNNER_TEMP" actionlint
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y yamllint shellcheck
          echo "$RUNNER_TEMP" >> "$GITHUB_PATH"

      - name: Lint workflows and enforce immutable action references
        run: |
          set -euo pipefail
          # Keep workflow syntax and expression validation blocking. Historical
          # inline shell style debt is handled separately so it cannot mask
          # real workflow regressions during the v0.2 compatibility phase.
          actionlint -shellcheck=
          # Stable publication workflows have no inline ShellCheck debt and
          # must keep their embedded release scripts fully blocking.
          actionlint \
            .github/workflows/ci.yml \
            .github/workflows/docker-build.yml \
            .github/workflows/electron-build.yml \
            .github/workflows/release.yml \
            .github/workflows/recover-v0.2.0.yml
          yamllint \
            -d '{extends: default, rules: {document-start: disable, line-length: disable, truthy: disable, comments: disable}}' \
            .github/workflows .github/dependabot.yml
          unpinned_references=$(rg -n \
            '^\s*(?:-\s+)?uses:\s*[^#[:space:]]+@(?![0-9a-f]{40}(?:\s|$))' \
            .github --glob '*.yml' --glob '*.yaml' -P || true)
          if [ -n "$unpinned_references" ]; then
            printf '%s\n' "$unpinned_references"
            echo '::error::Every external GitHub Action must be pinned to a full commit SHA.'
            exit 1
          fi
          mapfile -t release_scripts < <(find scripts/release -maxdepth 1 -type f -name '*.sh' | sort)
          if [ "${#release_scripts[@]}" -eq 0 ]; then
            echo '::error::No release shell scripts were discovered.'
            exit 1
          fi
          for release_script in "${release_scripts[@]}"; do
            bash -n "$release_script"
          done
          shellcheck -x "${release_scripts[@]}"
          scripts/release/github-release-assets-test.sh
          scripts/release/historical-assets-test.sh
          if rg -n -- '--method PATCH' \
            .github/workflows/release.yml \
            .github/workflows/recover-v0.2.0.yml; then
            echo '::error::Stable release metadata mutations must use the full-contract release helper.'
            exit 1
          fi

      - name: Verify preserved v0.1.6 historical assets
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: scripts/release/verify-historical-assets.sh

  backend:
    name: Backend tests
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.5'
          cache: true

      - name: Prepare embedded frontend placeholders
        run: |
          mkdir -p web/default/dist web/classic/dist
          printf '<!doctype html><html><head><title>ci</title></head><body>ci placeholder</body></html>' > web/default/dist/index.html
          printf '<!doctype html><html><head><title>ci</title></head><body>ci placeholder</body></html>' > web/classic/dist/index.html

      - name: Validate release version format
        run: |
          VERSION=$(< VERSION)
          if [[ ! "$VERSION" =~ ^v0\.2\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::VERSION must remain on the protected v0.2.x line. Current value: $VERSION"
            exit 1
          fi
          if ! cmp -s VERSION <(printf '%s\n' "$VERSION"); then
            echo '::error::VERSION must contain exactly one semver line and a final newline.'
            exit 1
          fi

      - name: Run backend tests
        run: |
          set -euo pipefail
          package_list=$(go list ./...)
          mapfile -t discovered_packages <<< "$package_list"
          packages=()
          for package in "${discovered_packages[@]}"; do
            if [ -n "$package" ] && [[ "$package" != */node_modules/* ]]; then
              packages+=("$package")
            fi
          done
          if [ "${#packages[@]}" -eq 0 ]; then
            echo '::error::go list returned no testable backend packages.'
            exit 1
          fi
          go test "${packages[@]}"
          go test -race "${packages[@]}"

      - name: Run Go vet
        run: go vet ./...

      - name: Scan reachable Go vulnerabilities
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.6.0 ./...

  mysql57-migration:
    name: MySQL 5.7 COMPACT migration
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.5'
          cache: true

      - name: Start MySQL 5.7 with the 5.7.8-era COMPACT default
        run: |
          set -euo pipefail
          MYSQL_ROOT_PASSWORD=$(openssl rand -hex 24)
          echo "::add-mask::$MYSQL_ROOT_PASSWORD"
          printf '%s\n' \
            "MYSQL57_TEST_CLEAN_DSN=root:${MYSQL_ROOT_PASSWORD}@tcp(127.0.0.1:3306)/new_api_clean?charset=utf8mb4&parseTime=true" \
            "MYSQL57_TEST_UPGRADE_DSN=root:${MYSQL_ROOT_PASSWORD}@tcp(127.0.0.1:3306)/new_api_upgrade?charset=utf8&parseTime=true" \
            "MYSQL57_TEST_V020_UPGRADE_DSN=root:${MYSQL_ROOT_PASSWORD}@tcp(127.0.0.1:3306)/new_api_v020_upgrade?charset=utf8mb4&parseTime=true" \
            "MYSQL57_TEST_LOG_DSN=root:${MYSQL_ROOT_PASSWORD}@tcp(127.0.0.1:3306)/new_api_log?charset=utf8mb4&parseTime=true" \
            "PAYMENT_MYSQL57_TEST_DSN=root:${MYSQL_ROOT_PASSWORD}@tcp(127.0.0.1:3306)/new_api_payment?charset=utf8mb4&parseTime=true" \
            "MYSQL57_TEST_GBK8_DSN=root:${MYSQL_ROOT_PASSWORD}@tcp(127.0.0.1:3307)/new_api_gbk8?charset=gbk&parseTime=true" \
            >>"$GITHUB_ENV"
          docker run --detach \
            --name new-api-mysql57 \
            --publish 3306:3306 \
            --env MYSQL_ROOT_PASSWORD="$MYSQL_ROOT_PASSWORD" \
            mysql@sha256:4bc6bc963e6d8443453676cae56536f4b8156d78bae03c0145cbe47c2aad73bb \
            --innodb-default-row-format=COMPACT \
            --innodb-file-format=Barracuda \
            --innodb-large-prefix=ON \
            --character-set-server=utf8mb4 \
            --collation-server=utf8mb4_unicode_ci
          docker run --detach \
            --name new-api-mysql57-gbk8 \
            --publish 3307:3306 \
            --env MYSQL_ROOT_PASSWORD="$MYSQL_ROOT_PASSWORD" \
            mysql@sha256:4bc6bc963e6d8443453676cae56536f4b8156d78bae03c0145cbe47c2aad73bb \
            --innodb-page-size=8192 \
            --innodb-default-row-format=COMPACT \
            --innodb-file-format=Barracuda \
            --innodb-large-prefix=ON \
            --character-set-server=gbk \
            --collation-server=gbk_chinese_ci
          for attempt in $(seq 1 90); do
            if docker exec new-api-mysql57 sh -c \
              'mysql -uroot -p"$MYSQL_ROOT_PASSWORD" --batch --skip-column-names -e "SELECT 1" >/dev/null 2>&1' && \
              docker exec new-api-mysql57-gbk8 sh -c \
              'mysql -uroot -p"$MYSQL_ROOT_PASSWORD" --batch --skip-column-names -e "SELECT 1" >/dev/null 2>&1'; then
              break
            fi
            if [ "$attempt" -eq 90 ]; then
              docker logs new-api-mysql57
              docker logs new-api-mysql57-gbk8
              exit 1
            fi
            sleep 1
          done
          docker exec new-api-mysql57 sh -c \
            'mysql -uroot -p"$MYSQL_ROOT_PASSWORD" -e "
              CREATE DATABASE new_api_clean CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
              CREATE DATABASE new_api_upgrade CHARACTER SET utf8 COLLATE utf8_general_ci;
              CREATE DATABASE new_api_v020_upgrade CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
              CREATE DATABASE new_api_log CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
              CREATE DATABASE new_api_payment CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
            "'
          docker exec new-api-mysql57-gbk8 sh -c \
            'mysql -uroot -p"$MYSQL_ROOT_PASSWORD" -e "
              CREATE DATABASE new_api_gbk8 CHARACTER SET gbk COLLATE gbk_chinese_ci;
            "'

      - name: Verify migration and payment concurrency contracts
        run: |
          go test ./model \
            -run '^(TestMySQL57CompactMigrationCompatibility|TestPaymentMySQL57IntegrationContracts|TestV020ToV021MySQL57Migration|TestV020ToV021SQLiteMigration)$' \
            -count=1

  postgres96-payment:
    name: PostgreSQL 9.6 payment contracts
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.5'
          cache: true

      - name: Start PostgreSQL 9.6
        run: |
          set -euo pipefail
          POSTGRES_PASSWORD=$(openssl rand -hex 24)
          echo "::add-mask::$POSTGRES_PASSWORD"
          printf '%s\n' \
            "PAYMENT_POSTGRES96_TEST_DSN=host=127.0.0.1 user=postgres password=${POSTGRES_PASSWORD} dbname=new_api_payment port=5432 sslmode=disable TimeZone=UTC" \
            "POSTGRES96_TEST_V020_UPGRADE_DSN=host=127.0.0.1 user=postgres password=${POSTGRES_PASSWORD} dbname=new_api_v020_upgrade port=5432 sslmode=disable TimeZone=UTC" \
            "POSTGRES96_TEST_LOCK_DSN=host=127.0.0.1 user=postgres password=${POSTGRES_PASSWORD} dbname=new_api_migration_lock port=5432 sslmode=disable TimeZone=UTC" \
            "POSTGRES96_TEST_LOG_DSN=host=127.0.0.1 user=postgres password=${POSTGRES_PASSWORD} dbname=new_api_log port=5432 sslmode=disable TimeZone=UTC" \
            >>"$GITHUB_ENV"
          docker run --detach \
            --name new-api-postgres96 \
            --publish 5432:5432 \
            --env POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
            --env POSTGRES_DB=new_api_payment \
            postgres@sha256:caddd35b05cdd56c614ab1f674e63be778e0abdf54e71a7507ff3e28d4902698
          for attempt in $(seq 1 90); do
            if docker exec new-api-postgres96 sh -c \
              'PGPASSWORD="$POSTGRES_PASSWORD" psql -h 127.0.0.1 -U postgres -d new_api_payment -tAc "SELECT 1" >/dev/null 2>&1'; then
              break
            fi
            if [ "$attempt" -eq 90 ]; then
              docker logs new-api-postgres96
              exit 1
            fi
            sleep 1
          done
          docker exec new-api-postgres96 sh -c \
            'PGPASSWORD="$POSTGRES_PASSWORD" createdb -h 127.0.0.1 -U postgres new_api_v020_upgrade &&
             PGPASSWORD="$POSTGRES_PASSWORD" createdb -h 127.0.0.1 -U postgres new_api_migration_lock &&
             PGPASSWORD="$POSTGRES_PASSWORD" createdb -h 127.0.0.1 -U postgres new_api_log'

      - name: Verify migration, lock, and payment concurrency contracts
        run: |
          go test ./model \
            -run '^(TestPaymentPostgreSQL96IntegrationContracts|TestPostgreSQL96MigrationLockContracts|TestV020ToV021PostgreSQL96Migration)$' \
            -count=1

  payment-multinode-runtime:
    name: Payment multi-node runtime
    runs-on: ubuntu-latest
    timeout-minutes: 25
    services:
      postgres:
        image: postgres@sha256:caddd35b05cdd56c614ab1f674e63be778e0abdf54e71a7507ff3e28d4902698
        env:
          POSTGRES_PASSWORD: payment-multinode-postgres-test-password
          POSTGRES_DB: new_api_multinode
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d new_api_multinode"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 45
      redis:
        image: redis@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.5'
          cache: true

      - name: Build runtime with embedded frontend placeholders
        run: |
          set -euo pipefail
          mkdir -p web/default/dist web/classic/dist
          printf '<!doctype html><html><body>ci placeholder</body></html>' >web/default/dist/index.html
          printf '<!doctype html><html><body>ci placeholder</body></html>' >web/classic/dist/index.html
          go build -trimpath -o "$RUNNER_TEMP/new-api-payment-multinode" .

      - name: Verify shared-database and shared-Redis payment readiness
        env:
          PAYMENT_MULTINODE_SQL_DSN: postgresql://postgres:payment-multinode-postgres-test-password@127.0.0.1:5432/new_api_multinode?sslmode=disable
          PAYMENT_MULTINODE_SPLIT_SQL_DSN: postgresql://postgres:payment-multinode-postgres-test-password@127.0.0.1:5432/postgres?sslmode=disable
          PAYMENT_MULTINODE_REDIS_URL: redis://127.0.0.1:6379/0
        run: scripts/release/payment-multinode-smoke.sh "$RUNNER_TEMP/new-api-payment-multinode"

  frontend-default:
    name: Default frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install verified Bun
        shell: bash
        run: scripts/release/install-bun.sh

      - name: Install frontend dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Audit frontend dependency lockfile
        working-directory: web
        run: ../scripts/release/audit-bun-lockfile.sh

      - name: Typecheck default frontend
        working-directory: web/default
        run: bun run typecheck

      - name: Test default frontend
        working-directory: web/default
        run: bun test

      - name: Lint default frontend
        working-directory: web/default
        run: |
          bun run lint
          bun run copyright:check

      - name: Validate default frontend locales
        working-directory: web/default
        run: |
          set -euo pipefail
          bun run i18n:sync
          git diff --exit-code -- src/i18n/locales
          jq --exit-status '
            .base == "en.json" and
            ((.locales | keys) == ["en", "fr", "ja", "ru", "vi", "zh", "zh-TW"]) and
            ([.locales[] |
              .missingCount == 0 and .extrasCount == 0
            ] | all) and
            (.locales.en.untranslatedScanStatus == "not-applicable") and
            (.locales.en.untranslatedCount == null) and
            ([.locales.fr, .locales.ja, .locales.ru, .locales.vi, .locales.zh] |
              all(
                .untranslatedScanStatus == "evaluated" and
                .untranslatedCount == 0
              )
            ) and
            (.locales["zh-TW"].untranslatedScanStatus == "not-evaluated") and
            (.locales["zh-TW"].untranslatedCount == null)
          ' src/i18n/locales/_reports/_sync-report.json >/dev/null

      - name: Format check default frontend advisory
        continue-on-error: true
        working-directory: web/default
        run: bun run format:check

      - name: Build default frontend
        working-directory: web/default
        env:
          DISABLE_ESLINT_PLUGIN: 'true'
        run: VITE_REACT_APP_VERSION=$(cat ../../VERSION) bun --bun run build

  frontend-classic:
    name: Classic frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install verified Bun
        shell: bash
        run: scripts/release/install-bun.sh

      - name: Install frontend dependencies
        working-directory: web
        run: bun install --frozen-lockfile

      - name: Lint classic frontend
        working-directory: web/classic
        run: bun run lint

      - name: Test classic frontend
        working-directory: web/classic
        run: bun test

      - name: Validate payment translations across both themes
        working-directory: web/classic
        run: bun run i18n:payment-admin

      - name: Build classic frontend
        working-directory: web/classic
        run: VITE_REACT_APP_VERSION=$(cat ../../VERSION) bun --bun run build

  macos-universal:
    name: macOS universal binary
    runs-on: macos-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Resolve repository version
        run: |
          set -euo pipefail
          version=$(<VERSION)
          if [[ ! "$version" =~ ^v0\.2\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::Invalid repository VERSION: $version"
            exit 1
          fi
          echo "VERSION=$version" >>"$GITHUB_ENV"

      - name: Install verified Bun
        shell: bash
        run: scripts/release/install-bun.sh

      - name: Build embedded frontends
        run: |
          set -euo pipefail
          cd web
          bun install --frozen-lockfile
          cd default
          DISABLE_ESLINT_PLUGIN=true VITE_REACT_APP_VERSION="$VERSION" bun --bun run build
          cd ../classic
          VITE_REACT_APP_VERSION="$VERSION" bun --bun run build

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.5'
          cache: true

      - name: Build and verify universal macOS binary
        run: |
          set -euo pipefail
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build \
            -trimpath \
            -ldflags "-s -w -X 'github.com/QuantumNous/new-api/common.Version=$VERSION'" \
            -o "new-api-macos-amd64-$VERSION"
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build \
            -trimpath \
            -ldflags "-s -w -X 'github.com/QuantumNous/new-api/common.Version=$VERSION'" \
            -o "new-api-macos-arm64-$VERSION"
          lipo -create \
            "new-api-macos-amd64-$VERSION" \
            "new-api-macos-arm64-$VERSION" \
            -output "new-api-macos-$VERSION"
          architectures=" $(lipo -archs "new-api-macos-$VERSION") "
          [[ "$architectures" == *' x86_64 '* ]]
          [[ "$architectures" == *' arm64 '* ]]
          [ "$("./new-api-macos-$VERSION" --version)" = "$VERSION" ]
          file "new-api-macos-$VERSION" | grep --quiet 'Mach-O universal binary'
          shasum -a 256 "new-api-macos-$VERSION" >checksums-macos.txt
          shasum -a 256 --check checksums-macos.txt

  electron-windows:
    name: Windows desktop package
    runs-on: windows-latest
    timeout-minutes: 45
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Resolve repository version
        run: |
          set -euo pipefail
          version=$(<VERSION)
          if [[ ! "$version" =~ ^v0\.2\.(0|[1-9][0-9]*)$ ]]; then
            echo "::error::Invalid repository VERSION: $version"
            exit 1
          fi
          echo "VERSION=$version" >>"$GITHUB_ENV"

      - name: Install verified Bun
        shell: bash
        run: scripts/release/install-bun.sh

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '22.23.1'

      - name: Set up Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.26.5'
          cache: true

      - name: Build embedded frontends
        run: |
          set -euo pipefail
          cd web
          bun install --frozen-lockfile
          cd default
          DISABLE_ESLINT_PLUGIN=true VITE_REACT_APP_VERSION="$VERSION" bun --bun run build
          cd ../classic
          VITE_REACT_APP_VERSION="$VERSION" bun --bun run build

      - name: Build Windows backend
        run: |
          set -euo pipefail
          go mod download
          CGO_ENABLED=0 GOEXPERIMENT=greenteagc GOOS=windows GOARCH=amd64 \
            go build \
              -trimpath \
              -ldflags "-s -w -X 'github.com/QuantumNous/new-api/common.Version=$VERSION'" \
              -o new-api.exe
          reported_version=$(./new-api.exe --version | tr -d '\r')
          [ "$reported_version" = "$VERSION" ]

      - name: Build and verify Electron installers
        run: scripts/release/build-electron-windows.sh "$VERSION"
