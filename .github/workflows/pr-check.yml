name: PR Check

permissions:
  contents: read
  issues: write
  pull-requests: write

on:
  pull_request_target:
    types: [opened, reopened]

jobs:
  pr-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: peakoss/anti-slop@85daca1880e9e1af197fc06ea03349daf08f4202 # v0.2.1
        with:
          max-failures: 4
          require-description: true

          # require-linked-issue: false
          require-pr-template: true
          strict-pr-template-sections: "✅ 提交前检查项 / Checklist"

          detect-spam-usernames: true
          min-account-age: 30

          failure-add-pr-labels: "pr-check-failed"
          failure-pr-message: "感谢提交。此 PR 的模板、说明或验证信息不完整，请补充实际影响、测试结果以及 AI/Codex 协助披露后重新运行检查。/ Thank you. This PR is missing required template, impact, verification, or AI-assistance information. Please complete it and rerun the checks."
          close-pr: false
