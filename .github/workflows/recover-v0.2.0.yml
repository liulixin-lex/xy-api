name: Recover v0.2.0 stable release

on:
  workflow_dispatch:
    inputs:
      confirm_tag:
        description: Type v0.2.0 to confirm the immutable release recovery
        required: true
        type: string
      confirm_release_id:
        description: Type 356446756 to confirm the existing draft
        required: true
        type: string

concurrency:
  group: stable-release-v0.2.0
  cancel-in-progress: false

env:
  TAG: v0.2.0
  TAG_COMMIT: ea3c0ef6cccddcf252f14f03abb11b2b74366233
  RELEASE_ID: '356446756'
  CORE_RUN_ID: '29706017668'
  CORE_ARTIFACT_ID: '8447988062'
  CORE_ARTIFACT_DIGEST: sha256:208e22ef506a2570b88b0f3f455934e654ec01d2fc192d9253948944c7c962ec
  ELECTRON_RUN_ID: '29706017582'
  ELECTRON_ARTIFACT_ID: '8447997895'
  ELECTRON_ARTIFACT_DIGEST: sha256:5f4a17e8f2bde4fcf8098fb3c84f3d04f50fee07a988f9c140353c742ae60a97
  EXPECTED_LATEST_DIGEST: sha256:6c1c40be02e2f52ca98b4545084c4daf60ade81fb4e21e7a51d2fa79447bd0b3

jobs:
  preflight:
    name: Validate the fixed v0.2.0 recovery source
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      CONFIRM_TAG: ${{ inputs.confirm_tag }}
      CONFIRM_RELEASE_ID: ${{ inputs.confirm_release_id }}
      IMMUTABLE_RELEASES_VERIFIED_TAG: ${{ vars.IMMUTABLE_RELEASES_VERIFIED_TAG }}
      DOCKERHUB_REPOSITORY: ${{ vars.DOCKERHUB_REPOSITORY }}
    steps:
      - name: Check out the protected recovery implementation
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Check out the immutable release source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ env.TAG_COMMIT }}
          fetch-depth: 1
          path: release-source

      - name: Validate confirmations, tag, release policy, and source runs
        env:
          IMMUTABLE_SETTINGS_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          set -euo pipefail
          if [ "$GITHUB_REPOSITORY" != liulixin-lex/xy-api ] || \
             [ "$GITHUB_REF" != refs/heads/main ] || \
             [ "$CONFIRM_TAG" != "$TAG" ] || \
             [ "$CONFIRM_RELEASE_ID" != "$RELEASE_ID" ]; then
            echo '::error::Recovery must be dispatched from protected main with both exact confirmations.'
            exit 1
          fi
          if [ "$(git rev-parse HEAD)" != "$GITHUB_SHA" ]; then
            echo '::error::The recovery checkout does not match the workflow dispatch commit.'
            exit 1
          fi
          if [ -n "$DOCKERHUB_REPOSITORY" ]; then
            echo '::error::v0.2.0 recovery expects no Docker Hub mirror.'
            exit 1
          fi

          git fetch --no-tags origin main
          git fetch --force origin "refs/tags/$TAG:refs/tags/$TAG"
          if [ "$(git rev-parse "refs/tags/$TAG^{commit}")" != "$TAG_COMMIT" ] || \
             ! git merge-base --is-ancestor "$TAG_COMMIT" origin/main; then
            echo '::error::The immutable v0.2.0 tag is missing, moved, or unreachable from main.'
            exit 1
          fi
          remote_tag_commit=$(git ls-remote --tags origin "refs/tags/$TAG" | awk '{print $1}')
          if [ "$remote_tag_commit" != "$TAG_COMMIT" ]; then
            echo '::error::The remote v0.2.0 tag does not resolve to the expected commit.'
            exit 1
          fi
          if [ "$(<release-source/VERSION)" != "$TAG" ] || \
             ! cmp -s release-source/VERSION <(printf '%s\n' "$TAG") || \
             [ ! -s "release-source/docs/releases/${TAG}.md" ]; then
            echo '::error::The immutable release source has an invalid version or release notes.'
            exit 1
          fi

          if [ -z "$IMMUTABLE_SETTINGS_TOKEN" ]; then
            echo '::error::The repository settings token is unavailable.'
            exit 1
          fi
          immutable_releases_enabled=$(GH_TOKEN="$IMMUTABLE_SETTINGS_TOKEN" gh api \
            "/repos/${GITHUB_REPOSITORY}/immutable-releases" \
            --jq '.enabled' 2>/dev/null || true)
          if [ "$IMMUTABLE_RELEASES_VERIFIED_TAG" != "$TAG" ] || \
             [ "$immutable_releases_enabled" != true ]; then
            echo '::error::GitHub Immutable Releases is not freshly verified for v0.2.0.'
            exit 1
          fi
          # GitHub omits bypass_actors unless the caller can write the ruleset.
          # Use the same scoped administration token that verified immutable releases.
          rulesets=$(GH_TOKEN="$IMMUTABLE_SETTINGS_TOKEN" gh api --paginate \
            "/repos/${GITHUB_REPOSITORY}/rulesets?per_page=100")
          ruleset_ids=$(jq --raw-output \
            '.[] | select(
              .name == "Protect immutable release tags" and
              .target == "tag" and
              .enforcement == "active"
            ) | .id' <<<"$rulesets")
          if [ "$(wc -w <<<"$ruleset_ids")" -ne 1 ]; then
            echo '::error::Expected one active immutable release tag ruleset.'
            exit 1
          fi
          ruleset=$(GH_TOKEN="$IMMUTABLE_SETTINGS_TOKEN" gh api \
            "/repos/${GITHUB_REPOSITORY}/rulesets/${ruleset_ids}")
          if ! jq --exit-status --argjson ruleset_id "$ruleset_ids" '
            .id == $ruleset_id and
            .name == "Protect immutable release tags" and
            .target == "tag" and
            .enforcement == "active" and
            has("bypass_actors") and
            .bypass_actors == [] and
            .conditions.ref_name.include == ["refs/tags/v*"] and
            .conditions.ref_name.exclude == [] and
            any(.rules[]; .type == "deletion") and
            any(.rules[];
              .type == "update" and
              .parameters.update_allows_fetch_and_merge == false
            )' <<<"$ruleset" >/dev/null; then
            echo '::error::The immutable release tag ruleset no longer matches the required policy.'
            exit 1
          fi

          release_json=$(scripts/release/github-release-assets.sh \
            resolve "$GITHUB_REPOSITORY" "$TAG")
          core_assets=$(jq --compact-output --null-input --arg tag "$TAG" '[
            "checksums-linux.txt",
            "checksums-macos.txt",
            "checksums-windows.txt",
            "checksums.txt",
            "new-api-\($tag)",
            "new-api-arm64-\($tag)",
            "new-api-macos-\($tag)",
            "new-api-\($tag).exe"
          ] | sort')
          all_assets=$(jq --compact-output --null-input \
            --arg tag "$TAG" \
            --arg desktop_version "${TAG#v}" '[
              "New-API-App.\($desktop_version).exe",
              "New-API-App.Setup.\($desktop_version).exe",
              "checksums-electron-windows.txt",
              "container-images.json",
              "checksums-linux.txt",
              "checksums-macos.txt",
              "checksums-windows.txt",
              "checksums.txt",
              "new-api-\($tag)",
              "new-api-arm64-\($tag)",
              "new-api-macos-\($tag)",
              "new-api-\($tag).exe"
            ] | sort')
          if ! jq --exit-status \
            --argjson release_id "$RELEASE_ID" \
            --arg tag "$TAG" \
            --arg commit "$TAG_COMMIT" \
            --argjson core_assets "$core_assets" \
            --argjson all_assets "$all_assets" \
            --rawfile body "release-source/docs/releases/${TAG}.md" \
            '.id == $release_id and
             .tag_name == $tag and
             .name == $tag and
             .body == $body and
             .prerelease == false and
             (.target_commitish == "main" or
              .target_commitish == $tag or
              .target_commitish == $commit) and
             (($core_assets - [.assets[].name]) | length == 0) and
             (((.draft == true and .immutable != true) and
               (([.assets[].name] - $all_assets) | length == 0)) or
              ((.draft == false and .immutable == true) and
               ([.assets[].name] | sort) == $all_assets)) and
             all(.assets[];
               .state == "uploaded" and
               (.size | type == "number" and . > 0) and
               (.digest |
                 type == "string" and test("^sha256:[0-9a-f]{64}$")))' \
            <<<"$release_json" >/dev/null; then
            echo '::error::The existing v0.2.0 release is not in a recoverable state.'
            exit 1
          fi

          core_run=$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${CORE_RUN_ID}")
          if ! jq --exit-status \
            --arg sha "$TAG_COMMIT" \
            --arg tag "$TAG" \
            '.event == "push" and
             .head_sha == $sha and
             .head_branch == $tag and
             .path == ".github/workflows/release.yml" and
             .status == "completed" and
             .conclusion == "failure"' <<<"$core_run" >/dev/null; then
            echo '::error::The original core release run does not match v0.2.0.'
            exit 1
          fi
          core_jobs_response=$(gh api \
            "/repos/${GITHUB_REPOSITORY}/actions/runs/${CORE_RUN_ID}/jobs?per_page=100")
          if [ "$(jq '.total_count' <<<"$core_jobs_response")" -gt 100 ]; then
            echo '::error::The core release run has too many jobs for an unambiguous recovery.'
            exit 1
          fi
          core_jobs=$(jq --compact-output '.jobs' <<<"$core_jobs_response")
          required_core_jobs=$(jq --compact-output --null-input '[
            "Validate immutable release source",
            "Release tests, race detector, vet, and typecheck",
            "Linux release assets",
            "macOS release assets",
            "Windows release assets",
            "Runtime acceptance (Redis disabled)",
            "Runtime acceptance (Redis enabled)",
            "Native arm64 standalone acceptance",
            "Verify complete release asset set"
          ]')
          if ! jq --exit-status \
            --argjson required "$required_core_jobs" '
              ([$required[] as $name |
                ([.[] | select(
                  .name == $name and
                  .status == "completed" and
                  .conclusion == "success"
                )] | length == 1)
              ] | all) and
              ([.[] | select(
                .name == "Stage or resume GitHub release" and
                .status == "completed" and
                .conclusion == "failure"
              )] | length == 1)' <<<"$core_jobs" >/dev/null; then
            echo '::error::The original core release gates are not in the expected recovery state.'
            exit 1
          fi

          electron_run=$(gh api "/repos/${GITHUB_REPOSITORY}/actions/runs/${ELECTRON_RUN_ID}")
          if ! jq --exit-status \
            --arg sha "$TAG_COMMIT" \
            --arg tag "$TAG" \
            '.event == "push" and
             .head_sha == $sha and
             .head_branch == $tag and
             .path == ".github/workflows/electron-build.yml" and
             .status == "completed" and
             .conclusion == "cancelled"' <<<"$electron_run" >/dev/null; then
            echo '::error::The Electron artifact source run does not match v0.2.0.'
            exit 1
          fi
          electron_jobs_response=$(gh api \
            "/repos/${GITHUB_REPOSITORY}/actions/runs/${ELECTRON_RUN_ID}/jobs?per_page=100")
          if [ "$(jq '.total_count' <<<"$electron_jobs_response")" -gt 100 ]; then
            echo '::error::The Electron run has too many jobs for an unambiguous recovery.'
            exit 1
          fi
          electron_jobs=$(jq --compact-output '.jobs' <<<"$electron_jobs_response")
          if ! jq --exit-status '
            ([.[] | select(
              .name == "build (windows-latest)" and
              .status == "completed" and
              .conclusion == "success"
            )] | length == 1)' <<<"$electron_jobs" >/dev/null; then
            echo '::error::The v0.2.0 Electron Windows build did not complete successfully.'
            exit 1
          fi

          core_artifacts=$(gh api \
            "/repos/${GITHUB_REPOSITORY}/actions/runs/${CORE_RUN_ID}/artifacts?per_page=100")
          electron_artifacts=$(gh api \
            "/repos/${GITHUB_REPOSITORY}/actions/runs/${ELECTRON_RUN_ID}/artifacts?per_page=100")
          if ! jq --exit-status \
            --argjson id "$CORE_ARTIFACT_ID" \
            --arg digest "$CORE_ARTIFACT_DIGEST" '
              [.artifacts[] | select(.name == "verified-release-assets")] as $matches |
              ($matches | length) == 1 and
              $matches[0].id == $id and
              $matches[0].digest == $digest and
              $matches[0].expired == false and
              $matches[0].size_in_bytes == 213069235' \
            <<<"$core_artifacts" >/dev/null || \
             ! jq --exit-status \
            --argjson id "$ELECTRON_ARTIFACT_ID" \
            --arg digest "$ELECTRON_ARTIFACT_DIGEST" '
              [.artifacts[] | select(.name == "windows-build")] as $matches |
              ($matches | length) == 1 and
              $matches[0].id == $id and
              $matches[0].digest == $digest and
              $matches[0].expired == false and
              $matches[0].size_in_bytes == 255466374' \
            <<<"$electron_artifacts" >/dev/null; then
            echo '::error::A source release artifact is missing, changed, duplicated, or expired.'
            exit 1
          fi

  verify_core:
    name: Re-verify existing core draft assets
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: write
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out recovery tooling
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - name: Check out immutable release verification tooling
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ env.TAG_COMMIT }}
          fetch-depth: 1
          path: release-source

      - name: Download the exact verified core build artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          artifact-ids: ${{ env.CORE_ARTIFACT_ID }}
          path: core-build
          merge-multiple: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ env.CORE_RUN_ID }}

      - name: Verify core checksums and byte-compare the private draft
        run: |
          set -euo pipefail
          release-source/scripts/release/verify-release-assets.sh core-build "$TAG"
          if [ "$(find core-build -mindepth 1 -maxdepth 1 | wc -l)" -ne 8 ]; then
            echo '::error::The verified core artifact has an unexpected file inventory.'
            exit 1
          fi

          release_copy="$RUNNER_TEMP/core-release-copy"
          mkdir -p "$release_copy"
          core_assets=(
            "new-api-${TAG}"
            "new-api-arm64-${TAG}"
            "new-api-macos-${TAG}"
            "new-api-${TAG}.exe"
            checksums-linux.txt
            checksums-macos.txt
            checksums-windows.txt
            checksums.txt
          )
          for asset_name in "${core_assets[@]}"; do
            scripts/release/github-release-assets.sh download \
              "$GITHUB_REPOSITORY" \
              "$RELEASE_ID" \
              "$asset_name" \
              "$release_copy/$asset_name"
            if ! cmp -s "core-build/$asset_name" "$release_copy/$asset_name"; then
              echo "::error::The existing draft core asset differs from the successful build: $asset_name"
              exit 1
            fi
          done
          release-source/scripts/release/verify-release-assets.sh \
            "$release_copy" "$TAG"

  stage_desktop:
    name: Verify and stage the existing Electron build
    needs: [preflight, verify_core]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: write
    outputs:
      base_asset_fingerprint: ${{ steps.assets.outputs.base_asset_fingerprint }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check out recovery tooling
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - name: Check out immutable release verification tooling
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ env.TAG_COMMIT }}
          fetch-depth: 1
          path: release-source

      - name: Download the exact successful Electron artifact
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          artifact-ids: ${{ env.ELECTRON_ARTIFACT_ID }}
          path: electron-build
          merge-multiple: true
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ env.ELECTRON_RUN_ID }}

      - name: Verify, reconcile, and fingerprint base assets
        id: assets
        run: |
          set -euo pipefail
          desktop_version=${TAG#v}
          desktop_assets=(
            "New-API-App.${desktop_version}.exe"
            "New-API-App.Setup.${desktop_version}.exe"
            checksums-electron-windows.txt
          )
          expected_electron_inventory=$(printf '%s\n' "${desktop_assets[@]}" | sort)
          actual_electron_inventory=$(find electron-build \
            -mindepth 1 -maxdepth 1 -type f -printf '%f\n' | sort)
          if ! diff -u \
            <(printf '%s\n' "$expected_electron_inventory") \
            <(printf '%s\n' "$actual_electron_inventory") || \
             [ "$(find electron-build -mindepth 1 -maxdepth 1 | wc -l)" -ne 3 ]; then
            echo '::error::The Electron artifact does not contain the exact expected files.'
            exit 1
          fi
          (
            cd electron-build
            mapfile -t checksum_names < <(awk '
              NF != 2 || $1 !~ /^[0-9a-f]{64}$/ { exit 1 }
              {
                name = $2
                sub(/^\*/, "", name)
                sub(/^\.\//, "", name)
                print name
              }
            ' checksums-electron-windows.txt)
            expected_names=(
              "New-API-App.${desktop_version}.exe"
              "New-API-App.Setup.${desktop_version}.exe"
            )
            if [ "${#checksum_names[@]}" -ne 2 ]; then
              echo '::error::Electron checksum inventory must contain exactly two installers.'
              exit 1
            fi
            for index in "${!expected_names[@]}"; do
              if [ "${checksum_names[$index]}" != "${expected_names[$index]}" ] || \
                 [ "$(od -An -N2 -tx1 "${expected_names[$index]}" | \
                   tr -d '[:space:]')" != 4d5a ]; then
                echo "::error::Invalid Electron installer artifact: ${expected_names[$index]}"
                exit 1
              fi
            done
            sha256sum --check --strict checksums-electron-windows.txt
          )

          release_json=$(gh api "/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}")
          allowed_assets=$(jq --compact-output --null-input \
            --arg tag "$TAG" \
            --arg desktop_version "$desktop_version" '[
              "New-API-App.\($desktop_version).exe",
              "New-API-App.Setup.\($desktop_version).exe",
              "checksums-electron-windows.txt",
              "container-images.json",
              "checksums-linux.txt",
              "checksums-macos.txt",
              "checksums-windows.txt",
              "checksums.txt",
              "new-api-\($tag)",
              "new-api-arm64-\($tag)",
              "new-api-macos-\($tag)",
              "new-api-\($tag).exe"
            ]')
          core_assets=$(jq --compact-output --null-input --arg tag "$TAG" '[
            "checksums-linux.txt",
            "checksums-macos.txt",
            "checksums-windows.txt",
            "checksums.txt",
            "new-api-\($tag)",
            "new-api-arm64-\($tag)",
            "new-api-macos-\($tag)",
            "new-api-\($tag).exe"
          ]')
          if ! jq --exit-status \
            --argjson release_id "$RELEASE_ID" \
            --arg tag "$TAG" \
            --argjson allowed "$allowed_assets" \
            --argjson core "$core_assets" \
            --rawfile body "release-source/docs/releases/${TAG}.md" '
              .id == $release_id and
              .tag_name == $tag and
              .body == $body and
              .prerelease == false and
              (([.assets[].name] - $allowed) | length == 0) and
              (($core - [.assets[].name]) | length == 0) and
              ((.draft == true and .immutable != true) or
               (.draft == false and .immutable == true))' \
            <<<"$release_json" >/dev/null; then
            echo '::error::The draft changed before Electron reconciliation.'
            exit 1
          fi

          if [ "$(jq --raw-output '.draft' <<<"$release_json")" = true ]; then
            release_state=draft
          else
            release_state=public
          fi

          existing_directory="$RUNNER_TEMP/existing-electron-assets"
          mkdir -p "$existing_directory"
          for asset_name in "${desktop_assets[@]}"; do
            release_json=$(gh api "/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}")
            if jq --exit-status --arg name "$asset_name" \
              '.assets | any(.name == $name)' <<<"$release_json" >/dev/null; then
              scripts/release/github-release-assets.sh download \
                "$GITHUB_REPOSITORY" \
                "$RELEASE_ID" \
                "$asset_name" \
                "$existing_directory/$asset_name"
              if ! cmp -s \
                "electron-build/$asset_name" \
                "$existing_directory/$asset_name"; then
                echo "::error::Existing Electron asset differs from the successful build: $asset_name"
                exit 1
              fi
              continue
            fi
            if [ "$release_state" != draft ]; then
              echo "::error::The immutable release is missing Electron asset: $asset_name"
              exit 1
            fi
            scripts/release/github-release-assets.sh upload \
              "$GITHUB_REPOSITORY" \
              "$RELEASE_ID" \
              "electron-build/$asset_name" >/dev/null
          done

          final_release=$(gh api "/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}")
          base_assets=$(jq --compact-output --null-input \
            --arg tag "$TAG" \
            --arg desktop_version "$desktop_version" '[
              "New-API-App.\($desktop_version).exe",
              "New-API-App.Setup.\($desktop_version).exe",
              "checksums-electron-windows.txt",
              "checksums-linux.txt",
              "checksums-macos.txt",
              "checksums-windows.txt",
              "checksums.txt",
              "new-api-\($tag)",
              "new-api-arm64-\($tag)",
              "new-api-macos-\($tag)",
              "new-api-\($tag).exe"
            ] | sort')
          if ! jq --exit-status \
            --argjson base "$base_assets" '
              ([.assets[].name | select(. != "container-images.json")] | sort) == $base and
              (((.draft == true and .immutable != true) and
                ([.assets[].name | select(. == "container-images.json")] | length) <= 1) or
               ((.draft == false and .immutable == true) and
                ([.assets[].name | select(. == "container-images.json")] | length) == 1)) and
              all(.assets[];
                .state == "uploaded" and
                (.size | type == "number" and . > 0) and
                (.digest |
                  type == "string" and test("^sha256:[0-9a-f]{64}$")))' \
            <<<"$final_release" >/dev/null; then
            echo '::error::The draft does not expose the exact verified base asset inventory.'
            exit 1
          fi

          verification_directory="$RUNNER_TEMP/base-release-assets"
          core_directory="$RUNNER_TEMP/base-core-assets"
          desktop_directory="$RUNNER_TEMP/base-desktop-assets"
          mkdir -p "$verification_directory" "$core_directory" "$desktop_directory"
          mapfile -t base_asset_names < <(jq --raw-output \
            '.assets[].name | select(. != "container-images.json")' \
            <<<"$final_release" | sort)
          for asset_name in "${base_asset_names[@]}"; do
            scripts/release/github-release-assets.sh download \
              "$GITHUB_REPOSITORY" \
              "$RELEASE_ID" \
              "$asset_name" \
              "$verification_directory/$asset_name"
          done
          for asset_name in \
            "new-api-${TAG}" \
            "new-api-arm64-${TAG}" \
            "new-api-macos-${TAG}" \
            "new-api-${TAG}.exe" \
            checksums-linux.txt \
            checksums-macos.txt \
            checksums-windows.txt \
            checksums.txt; do
            cp -- "$verification_directory/$asset_name" "$core_directory/"
          done
          release-source/scripts/release/verify-release-assets.sh \
            "$core_directory" "$TAG"
          for asset_name in "${desktop_assets[@]}"; do
            cp -- "$verification_directory/$asset_name" "$desktop_directory/"
          done
          (
            cd "$desktop_directory"
            sha256sum --check --strict checksums-electron-windows.txt
          )

          base_inventory=$(jq --compact-output '[.assets[] |
            select(.name != "container-images.json") |
            {name: .name, digest: .digest}
          ] | sort_by(.name)' <<<"$final_release")
          base_asset_fingerprint=$(printf '%s' "$base_inventory" | \
            sha256sum | awk '{print $1}')
          if ! [[ "$base_asset_fingerprint" =~ ^[0-9a-f]{64}$ ]]; then
            echo '::error::Unable to fingerprint the verified base assets.'
            exit 1
          fi
          echo "base_asset_fingerprint=$base_asset_fingerprint" >>"$GITHUB_OUTPUT"

  docker:
    name: Build, verify, sign, and publish v0.2.0 images once
    needs: stage_desktop
    permissions:
      contents: read
      packages: write
      id-token: write
    uses: liulixin-lex/xy-api/.github/workflows/docker-build.yml@v0.2.0
    with:
      tag: v0.2.0
      release_ref: refs/tags/v0.2.0
      release_commit: ea3c0ef6cccddcf252f14f03abb11b2b74366233

  anchor_container:
    name: Anchor verified container digests in the existing draft
    needs: [stage_desktop, docker]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write
    outputs:
      asset_fingerprint: ${{ steps.manifest.outputs.asset_fingerprint }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      BASE_ASSET_FINGERPRINT: ${{ needs.stage_desktop.outputs.base_asset_fingerprint }}
      GHCR_DIGEST: ${{ needs.docker.outputs.ghcr_digest }}
      DOCKERHUB_DIGEST: ${{ needs.docker.outputs.dockerhub_digest }}
      DOCKERHUB_REPOSITORY: ${{ vars.DOCKERHUB_REPOSITORY }}
    steps:
      - name: Check out recovery tooling and release notes
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 1

      - name: Check out immutable release notes
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ env.TAG_COMMIT }}
          fetch-depth: 1
          path: release-source

      - name: Create, reconcile, and fingerprint the container manifest
        id: manifest
        run: |
          set -euo pipefail
          if ! [[ "$BASE_ASSET_FINGERPRINT" =~ ^[0-9a-f]{64}$ ]] || \
             ! [[ "$GHCR_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]] || \
             [ -n "$DOCKERHUB_REPOSITORY" ] || \
             [ -n "$DOCKERHUB_DIGEST" ]; then
            echo '::error::The recovery image outputs do not match the v0.2.0 registry contract.'
            exit 1
          fi

          ghcr_repository=${GITHUB_REPOSITORY,,}
          identity="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/docker-build.yml@refs/tags/${TAG}"
          issuer='https://token.actions.githubusercontent.com'
          jq --sort-keys --indent 2 --null-input \
            --arg tag "$TAG" \
            --arg commit "$TAG_COMMIT" \
            --arg ghcr_tag "ghcr.io/${ghcr_repository}:${TAG}" \
            --arg ghcr_digest "$GHCR_DIGEST" \
            --arg ghcr_reference "ghcr.io/${ghcr_repository}@${GHCR_DIGEST}" \
            --arg identity "$identity" \
            --arg issuer "$issuer" '{
              schema_version: 1,
              release: {tag: $tag, source_commit: $commit},
              images: {
                ghcr: {
                  tag: $ghcr_tag,
                  digest: $ghcr_digest,
                  reference: $ghcr_reference
                },
                dockerhub: null
              },
              cosign: {
                certificate_identity: $identity,
                certificate_oidc_issuer: $issuer
              }
            }' >container-images.json

          release_json=$(gh api "/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}")
          base_assets=$(jq --compact-output --null-input \
            --arg tag "$TAG" \
            --arg desktop_version "${TAG#v}" '[
              "New-API-App.\($desktop_version).exe",
              "New-API-App.Setup.\($desktop_version).exe",
              "checksums-electron-windows.txt",
              "checksums-linux.txt",
              "checksums-macos.txt",
              "checksums-windows.txt",
              "checksums.txt",
              "new-api-\($tag)",
              "new-api-arm64-\($tag)",
              "new-api-macos-\($tag)",
              "new-api-\($tag).exe"
            ] | sort')
          if ! jq --exit-status \
            --argjson release_id "$RELEASE_ID" \
            --arg tag "$TAG" \
            --argjson base "$base_assets" \
            --rawfile body "release-source/docs/releases/${TAG}.md" '
              .id == $release_id and
              .tag_name == $tag and
              .body == $body and
              .prerelease == false and
              ([.assets[].name | select(. != "container-images.json")] | sort) == $base and
              (((.draft == true and .immutable != true) and
                ([.assets[].name | select(. == "container-images.json")] | length) <= 1) or
               ((.draft == false and .immutable == true) and
                ([.assets[].name | select(. == "container-images.json")] | length) == 1))' \
            <<<"$release_json" >/dev/null; then
            echo '::error::The draft changed before the container manifest was anchored.'
            exit 1
          fi
          base_inventory=$(jq --compact-output '[.assets[] |
            select(.name != "container-images.json") |
            {name: .name, digest: .digest}
          ] | sort_by(.name)' <<<"$release_json")
          current_base_fingerprint=$(printf '%s' "$base_inventory" | \
            sha256sum | awk '{print $1}')
          if [ "$current_base_fingerprint" != "$BASE_ASSET_FINGERPRINT" ]; then
            echo '::error::A verified base asset changed before container anchoring.'
            exit 1
          fi

          if jq --exit-status \
            '.assets | any(.name == "container-images.json")' \
            <<<"$release_json" >/dev/null; then
            existing_directory="$RUNNER_TEMP/existing-container-manifest"
            mkdir -p "$existing_directory"
            scripts/release/github-release-assets.sh download \
              "$GITHUB_REPOSITORY" \
              "$RELEASE_ID" \
              container-images.json \
              "$existing_directory/container-images.json"
            if ! cmp -s \
              container-images.json \
              "$existing_directory/container-images.json"; then
              echo '::error::Existing container manifest differs from verified image outputs.'
              exit 1
            fi
          elif [ "$(jq --raw-output '.draft' <<<"$release_json")" = true ]; then
            scripts/release/github-release-assets.sh upload \
              "$GITHUB_REPOSITORY" \
              "$RELEASE_ID" \
              container-images.json >/dev/null
          else
            echo '::error::The immutable release is missing container-images.json.'
            exit 1
          fi

          final_release=$(gh api "/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}")
          expected_assets=$(jq --compact-output --null-input \
            --argjson base "$base_assets" '$base + ["container-images.json"] | sort')
          local_manifest_digest="sha256:$(sha256sum container-images.json | awk '{print $1}')"
          if ! jq --exit-status \
            --argjson expected "$expected_assets" \
            --arg manifest_digest "$local_manifest_digest" '
              ((.draft == true and .immutable != true) or
               (.draft == false and .immutable == true)) and
              ([.assets[].name] | sort) == $expected and
              all(.assets[];
                .state == "uploaded" and
                (.size | type == "number" and . > 0) and
                (.digest |
                  type == "string" and test("^sha256:[0-9a-f]{64}$"))) and
              ([.assets[] | select(
                .name == "container-images.json" and
                .digest == $manifest_digest
              )] | length) == 1' <<<"$final_release" >/dev/null; then
            echo '::error::The final staged release asset inventory is invalid.'
            exit 1
          fi
          final_base_inventory=$(jq --compact-output '[.assets[] |
            select(.name != "container-images.json") |
            {name: .name, digest: .digest}
          ] | sort_by(.name)' <<<"$final_release")
          if [ "$(printf '%s' "$final_base_inventory" | sha256sum | awk '{print $1}')" != \
               "$BASE_ASSET_FINGERPRINT" ]; then
            echo '::error::A base asset changed while the container manifest was staged.'
            exit 1
          fi
          final_inventory=$(jq --compact-output '[.assets[] |
            {name: .name, digest: .digest}
          ] | sort_by(.name)' <<<"$final_release")
          asset_fingerprint=$(printf '%s' "$final_inventory" | \
            sha256sum | awk '{print $1}')
          echo "asset_fingerprint=$asset_fingerprint" >>"$GITHUB_OUTPUT"

  publish:
    name: Verify and publish the immutable v0.2.0 release
    needs: [stage_desktop, docker, anchor_container]
    runs-on: ubuntu-latest
    timeout-minutes: 25
    concurrency:
      group: stable-release-publication
      cancel-in-progress: false
    permissions:
      contents: write
      packages: read
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ASSET_FINGERPRINT: ${{ needs.anchor_container.outputs.asset_fingerprint }}
      GHCR_DIGEST: ${{ needs.docker.outputs.ghcr_digest }}
      DOCKERHUB_DIGEST: ${{ needs.docker.outputs.dockerhub_digest }}
      DOCKERHUB_REPOSITORY: ${{ vars.DOCKERHUB_REPOSITORY }}
      IMMUTABLE_RELEASES_VERIFIED_TAG: ${{ vars.IMMUTABLE_RELEASES_VERIFIED_TAG }}
    steps:
      - name: Check out recovery tooling
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Check out immutable release verification tooling
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ env.TAG_COMMIT }}
          fetch-depth: 1
          path: release-source

      - name: Install verified Docker Buildx
        run: release-source/scripts/release/install-buildx.sh

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
        with:
          driver-opts: image=moby/buildkit:v0.31.2@sha256:2f5adac4ecd194d9f8c10b7b5d7bceb5186853db1b26e5abd3a657af0b7e26ec

      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3
        with:
          cosign-release: v2.5.2

      - name: Re-verify all assets, images, policies, and publish once
        env:
          IMMUTABLE_SETTINGS_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          set -euo pipefail
          if ! [[ "$ASSET_FINGERPRINT" =~ ^[0-9a-f]{64}$ ]] || \
             ! [[ "$GHCR_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]] || \
             [ -n "$DOCKERHUB_REPOSITORY" ] || \
             [ -n "$DOCKERHUB_DIGEST" ] || \
             [ "$IMMUTABLE_RELEASES_VERIFIED_TAG" != "$TAG" ]; then
            echo '::error::Final release outputs or policy variables are invalid.'
            exit 1
          fi

          git fetch --no-tags origin main
          git fetch --force origin "refs/tags/$TAG:refs/tags/$TAG"
          if [ "$(git rev-parse "refs/tags/$TAG^{commit}")" != "$TAG_COMMIT" ] || \
             ! git merge-base --is-ancestor "$TAG_COMMIT" origin/main; then
            echo '::error::The v0.2.0 tag changed before publication.'
            exit 1
          fi
          if [ -z "$IMMUTABLE_SETTINGS_TOKEN" ]; then
            echo '::error::The repository settings token is unavailable.'
            exit 1
          fi
          immutable_releases_enabled=$(GH_TOKEN="$IMMUTABLE_SETTINGS_TOKEN" gh api \
            "/repos/${GITHUB_REPOSITORY}/immutable-releases" \
            --jq '.enabled' 2>/dev/null || true)
          if [ "$immutable_releases_enabled" != true ]; then
            echo '::error::GitHub Immutable Releases is disabled.'
            exit 1
          fi
          validate_tag_ruleset_contract() {
            local rulesets ruleset_id ruleset
            rulesets=$(GH_TOKEN="$IMMUTABLE_SETTINGS_TOKEN" gh api --paginate \
              "/repos/${GITHUB_REPOSITORY}/rulesets?per_page=100") || return 1
            ruleset_id=$(jq --raw-output '
              .[] | select(
                .name == "Protect immutable release tags" and
                .target == "tag" and
                .enforcement == "active"
              ) | .id' <<<"$rulesets")
            [[ "$ruleset_id" =~ ^[1-9][0-9]*$ ]] || return 1
            ruleset=$(GH_TOKEN="$IMMUTABLE_SETTINGS_TOKEN" gh api \
              "/repos/${GITHUB_REPOSITORY}/rulesets/${ruleset_id}") || return 1
            jq --exit-status --argjson ruleset_id "$ruleset_id" '
              .id == $ruleset_id and
              .name == "Protect immutable release tags" and
              .target == "tag" and
              .enforcement == "active" and
              has("bypass_actors") and
              .bypass_actors == [] and
              .conditions.ref_name.include == ["refs/tags/v*"] and
              .conditions.ref_name.exclude == [] and
              any(.rules[]; .type == "deletion") and
              any(.rules[];
                .type == "update" and
                .parameters.update_allows_fetch_and_merge == false
              )' <<<"$ruleset" >/dev/null
          }
          if ! validate_tag_ruleset_contract; then
            echo '::error::The immutable release tag ruleset changed before publication.'
            exit 1
          fi

          ghcr_repository=${GITHUB_REPOSITORY,,}
          ghcr_tag="ghcr.io/${ghcr_repository}:${TAG}"
          ghcr_reference="ghcr.io/${ghcr_repository}@${GHCR_DIGEST}"
          identity="https://github.com/${GITHUB_REPOSITORY}/.github/workflows/docker-build.yml@refs/tags/${TAG}"
          issuer='https://token.actions.githubusercontent.com'
          resolved_digest=$(docker buildx imagetools inspect "$ghcr_tag" \
            --format '{{json .Manifest}}' | jq --raw-output '.digest')
          if [ "$resolved_digest" != "$GHCR_DIGEST" ]; then
            echo '::error::The publish-once v0.2.0 image tag changed after verification.'
            exit 1
          fi
          release-source/scripts/release/verify-image-index.sh \
            "$ghcr_reference" "$TAG" "$TAG_COMMIT"
          cosign verify \
            --certificate-identity "$identity" \
            --certificate-oidc-issuer "$issuer" \
            "$ghcr_reference" >/dev/null

          release_json=$(gh api "/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}")
          expected_assets=$(jq --compact-output --null-input \
            --arg tag "$TAG" \
            --arg desktop_version "${TAG#v}" '[
              "New-API-App.\($desktop_version).exe",
              "New-API-App.Setup.\($desktop_version).exe",
              "checksums-electron-windows.txt",
              "checksums-linux.txt",
              "checksums-macos.txt",
              "checksums-windows.txt",
              "checksums.txt",
              "container-images.json",
              "new-api-\($tag)",
              "new-api-arm64-\($tag)",
              "new-api-macos-\($tag)",
              "new-api-\($tag).exe"
            ] | sort')
          validate_release_contract() {
            jq --exit-status \
              --argjson release_id "$RELEASE_ID" \
              --arg tag "$TAG" \
              --argjson expected "$expected_assets" \
              --rawfile body "release-source/docs/releases/${TAG}.md" '
                .id == $release_id and
                .tag_name == $tag and
                .name == $tag and
                .body == $body and
                .prerelease == false and
                ([.assets[].name] | sort) == $expected and
                all(.assets[];
                  .state == "uploaded" and
                  (.size | type == "number" and . > 0) and
                  (.digest |
                    type == "string" and test("^sha256:[0-9a-f]{64}$")))
              '
          }
          if ! validate_release_contract <<<"$release_json" >/dev/null; then
            echo '::error::The staged release no longer matches the immutable contract.'
            exit 1
          fi
          release_inventory=$(jq --compact-output '[.assets[] |
            {name: .name, digest: .digest}
          ] | sort_by(.name)' <<<"$release_json")
          if [ "$(printf '%s' "$release_inventory" | sha256sum | awk '{print $1}')" != \
               "$ASSET_FINGERPRINT" ]; then
            echo '::error::A staged asset changed after final fingerprinting.'
            exit 1
          fi

          all_directory="$RUNNER_TEMP/final-release-assets"
          core_directory="$RUNNER_TEMP/final-core-assets"
          desktop_directory="$RUNNER_TEMP/final-desktop-assets"
          mkdir -p "$all_directory" "$core_directory" "$desktop_directory"
          mapfile -t asset_names < <(jq --raw-output '.assets[].name' \
            <<<"$release_json" | sort)
          for asset_name in "${asset_names[@]}"; do
            scripts/release/github-release-assets.sh download \
              "$GITHUB_REPOSITORY" \
              "$RELEASE_ID" \
              "$asset_name" \
              "$all_directory/$asset_name"
          done
          for asset_name in \
            "new-api-${TAG}" \
            "new-api-arm64-${TAG}" \
            "new-api-macos-${TAG}" \
            "new-api-${TAG}.exe" \
            checksums-linux.txt \
            checksums-macos.txt \
            checksums-windows.txt \
            checksums.txt; do
            cp -- "$all_directory/$asset_name" "$core_directory/"
          done
          release-source/scripts/release/verify-release-assets.sh \
            "$core_directory" "$TAG"
          for asset_name in \
            "New-API-App.${TAG#v}.exe" \
            "New-API-App.Setup.${TAG#v}.exe" \
            checksums-electron-windows.txt; do
            cp -- "$all_directory/$asset_name" "$desktop_directory/"
          done
          (
            cd "$desktop_directory"
            sha256sum --check --strict checksums-electron-windows.txt
            for installer in \
              "New-API-App.${TAG#v}.exe" \
              "New-API-App.Setup.${TAG#v}.exe"; do
              if [ "$(od -An -N2 -tx1 "$installer" | tr -d '[:space:]')" != 4d5a ]; then
                echo "::error::Final Electron asset is not a Windows executable: $installer"
                exit 1
              fi
            done
          )
          if ! jq --exit-status \
            --arg tag "$TAG" \
            --arg commit "$TAG_COMMIT" \
            --arg digest "$GHCR_DIGEST" \
            --arg identity "$identity" \
            --arg issuer "$issuer" '
              (keys | sort) ==
                ["cosign", "images", "release", "schema_version"] and
              .schema_version == 1 and
              .release.tag == $tag and
              .release.source_commit == $commit and
              .images.ghcr.tag ==
                "ghcr.io/liulixin-lex/xy-api:v0.2.0" and
              .images.ghcr.digest == $digest and
              .images.ghcr.reference ==
                ("ghcr.io/liulixin-lex/xy-api@" + $digest) and
              .images.dockerhub == null and
              .cosign.certificate_identity == $identity and
              .cosign.certificate_oidc_issuer == $issuer' \
            "$all_directory/container-images.json" >/dev/null; then
            echo '::error::container-images.json does not match the verified image.'
            exit 1
          fi

          current_latest_digest=$(docker buildx imagetools inspect \
            ghcr.io/liulixin-lex/xy-api:latest \
            --format '{{json .Manifest}}' | jq --raw-output '.digest')
          if [ "$current_latest_digest" != "$EXPECTED_LATEST_DIGEST" ] || \
             [ "$current_latest_digest" = "$GHCR_DIGEST" ]; then
            echo '::error::The global container latest alias changed before v0.2.0 publication.'
            exit 1
          fi

          if jq --exit-status '.draft == true and .immutable != true' \
            <<<"$release_json" >/dev/null; then
            mapfile -t published_stable_tags < <(gh api --paginate \
              "/repos/${GITHUB_REPOSITORY}/releases?per_page=100" \
              --jq '.[] | select(.draft == false and .prerelease == false) | .tag_name')
            for published_tag in "${published_stable_tags[@]}"; do
              if ! [[ "$published_tag" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]]; then
                echo "::error::Published stable release has an invalid semantic version tag: $published_tag"
                exit 1
              fi
            done
            newest_tag=$(printf '%s\n' "${published_stable_tags[@]}" "$TAG" | \
              sort -V | tail -n 1)
            if [ "$newest_tag" != "$TAG" ]; then
              echo '::error::A newer stable GitHub Release already exists.'
              exit 1
            fi

            prepublish_release=$(gh api \
              "/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}")
            resolved_release=$(scripts/release/github-release-assets.sh \
              resolve "$GITHUB_REPOSITORY" "$TAG")
            prepublish_inventory=$(jq --compact-output '[.assets[] |
              {name: .name, digest: .digest}
            ] | sort_by(.name)' <<<"$prepublish_release")
            git fetch --no-tags origin main
            prepublish_remote_tag_commit=$(git ls-remote --tags origin \
              "refs/tags/$TAG" | awk '{print $1}')
            prepublish_immutable=$(GH_TOKEN="$IMMUTABLE_SETTINGS_TOKEN" gh api \
              "/repos/${GITHUB_REPOSITORY}/immutable-releases" \
              --jq '.enabled' 2>/dev/null || true)
            if ! validate_release_contract <<<"$prepublish_release" >/dev/null || \
               ! jq --exit-status '.draft == true and .immutable != true' \
                 <<<"$prepublish_release" >/dev/null || \
               [ "$(jq --raw-output '.id' <<<"$resolved_release")" != "$RELEASE_ID" ] || \
               [ "$(printf '%s' "$prepublish_inventory" | sha256sum | awk '{print $1}')" != \
                 "$ASSET_FINGERPRINT" ] || \
               [ "$(git rev-parse "refs/tags/$TAG^{commit}")" != "$TAG_COMMIT" ] || \
               [ "$prepublish_remote_tag_commit" != "$TAG_COMMIT" ] || \
               ! git merge-base --is-ancestor "$TAG_COMMIT" origin/main || \
               ! validate_tag_ruleset_contract || \
               [ "$prepublish_immutable" != true ]; then
              echo '::error::The release contract changed immediately before publication.'
              exit 1
            fi

            if ! gh api \
              --method PATCH \
              "/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" \
              -F draft=false \
              -F prerelease=false \
              -f make_latest=true >/dev/null; then
              echo 'The publication response was not confirmed; reconciling by release id without retrying the PATCH.'
            fi
          elif ! jq --exit-status '.draft == false and .immutable == true' \
            <<<"$release_json" >/dev/null; then
            echo '::error::The release is neither the verified draft nor its immutable publication.'
            exit 1
          fi

          publication_verified=false
          for _ in $(seq 1 18); do
            published_release=$(gh api \
              "/repos/${GITHUB_REPOSITORY}/releases/${RELEASE_ID}" 2>/dev/null || true)
            if [ -n "$published_release" ] && \
               validate_release_contract <<<"$published_release" >/dev/null && \
               jq --exit-status '.draft == false and .immutable == true' \
                 <<<"$published_release" >/dev/null; then
              published_inventory=$(jq --compact-output '[.assets[] |
                {name: .name, digest: .digest}
              ] | sort_by(.name)' <<<"$published_release")
              tag_release_id=$(gh api \
                "/repos/${GITHUB_REPOSITORY}/releases/tags/${TAG}" \
                --jq '.id' 2>/dev/null || true)
              latest_release_tag=$(gh api \
                "/repos/${GITHUB_REPOSITORY}/releases/latest" \
                --jq '.tag_name' 2>/dev/null || true)
              if [ "$(printf '%s' "$published_inventory" | sha256sum | awk '{print $1}')" = \
                   "$ASSET_FINGERPRINT" ] && \
                 [ "$tag_release_id" = "$RELEASE_ID" ] && \
                 [ "$latest_release_tag" = "$TAG" ]; then
                publication_verified=true
                break
              fi
            fi
            sleep 5
          done
          if [ "$publication_verified" != true ]; then
            echo '::error::The immutable public v0.2.0 release could not be verified.'
            exit 1
          fi

          final_latest_digest=$(docker buildx imagetools inspect \
            ghcr.io/liulixin-lex/xy-api:latest \
            --format '{{json .Manifest}}' | jq --raw-output '.digest')
          if [ "$final_latest_digest" != "$EXPECTED_LATEST_DIGEST" ]; then
            echo '::error::The global container latest alias moved during publication.'
            exit 1
          fi
          {
            echo '### v0.2.0 immutable recovery completed'
            echo
            echo 'The existing draft was completed without moving the tag, replacing an asset, or changing the global container latest alias.'
          } >>"$GITHUB_STEP_SUMMARY"
