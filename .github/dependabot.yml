version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "02:00"
      timezone: Asia/Shanghai
    groups:
      github-actions:
        patterns:
          - "*"
    open-pull-requests-limit: 3

  - package-ecosystem: gomod
    directory: /
    schedule:
      interval: weekly
      day: tuesday
      time: "02:00"
      timezone: Asia/Shanghai
    groups:
      go-minor-and-patch:
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 3

  - package-ecosystem: npm
    directory: /web
    schedule:
      interval: weekly
      day: wednesday
      time: "02:00"
      timezone: Asia/Shanghai
    groups:
      web-minor-and-patch:
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 3

  - package-ecosystem: npm
    directory: /electron
    schedule:
      interval: weekly
      day: thursday
      time: "02:00"
      timezone: Asia/Shanghai
    groups:
      electron-minor-and-patch:
        update-types:
          - minor
          - patch
    open-pull-requests-limit: 2

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: friday
      time: "02:00"
      timezone: Asia/Shanghai
    groups:
      docker-images:
        patterns:
          - "*"
    open-pull-requests-limit: 2
