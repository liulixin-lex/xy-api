#      - "3306:3306"  # Uncomment if you need to access MySQL from outside Docker
#    healthcheck:
#      test: ["CMD-SHELL", "mysqladmin ping --protocol=TCP -h 127.0.0.1 -uroot -p\"$$MYSQL_ROOT_PASSWORD\""]
#      interval: 10s
#      timeout: 5s
#      retries: 5

#  clickhouse:
#    image: clickhouse/clickhouse-server:25.8@sha256:a9d328123ff8a61bf6b16448528b577d59deb85758172e13b09054b0727f8adf
#    restart: always
#    depends_on:
#      config-check:
#        condition: service_completed_successfully
#    environment:
#      CLICKHOUSE_DB: new_api_logs
#      CLICKHOUSE_USER: default
#      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:?Set CLICKHOUSE_PASSWORD to an independent openssl rand -hex 32 value}
#      CLICKHOUSE_DEFAULT_ACCESS_MANAGEMENT: 1
#    volumes:
#      - clickhouse_data:/var/lib/clickhouse
#    networks:
#      - new-api-network
#    ports:
#      - "8123:8123"  # HTTP interface, uncomment if you need external access
#      - "9000:9000"  # Native interface used by the LOG_SQL_DSN example above
#    healthcheck:
#      test: ["CMD-SHELL", "clickhouse-client --user default --password \"$$CLICKHOUSE_PASSWORD\" --query 'SELECT 1'"]
#      interval: 10s
#      timeout: 5s
