# New-API Docker Compose Configuration
#
# Quick Start:
#   1. Copy .env.example to .env and set every variable marked REQUIRED_FOR_COMPOSE
#      with independent `openssl rand -hex 32` values. Set NEW_API_IMAGE to the
#      v0.2.2 digest reference from the immutable Release container-images.json
#      after the protected release workflow publishes it.
#   2. Run `docker compose config` and review the resolved image and mounts.
#   3. Run `docker compose run --rm config-check` to validate secret strength.
#   4. Run `docker compose up -d`.
#   5. Access at http://localhost:3000.
#
# Using MySQL instead of PostgreSQL:
#   1. Comment out the postgres service and PostgreSQL SQL_DSN
#   2. Uncomment the mysql service and MySQL SQL_DSN
#   3. Uncomment mysql in depends_on using the same mapping format
#   4. Uncomment mysql_data in the volumes section
#   5. Set MYSQL_ROOT_PASSWORD; POSTGRES_PASSWORD may then be left empty
#
# ⚠️  IMPORTANT: This file intentionally has no password or secret defaults.
#     Compose refuses to render until every required value is present and non-empty.
# ⚠️  v0.2.2 supports clean installs and rehearsed upgrades from v0.2.1.
#     Earlier installations must follow the staged v0.1.6 -> v0.2.0 -> v0.2.1 path.
#     Direct v0.1.7-v0.1.14 production upgrades are not claimed for this release candidate.
#     The /api/readiness health check remains required; do not substitute a v0.2.0 image.

services:
  config-check:
    image: alpine:3.24.1@sha256:28bd5fe8b56d1bd048e5babf5b10710ebe0bae67db86916198a6eec434943f8b
    restart: "no"
    environment:
      NEW_API_IMAGE: ${NEW_API_IMAGE:?Set NEW_API_IMAGE to the verified v0.2.2 digest reference from container-images.json}
      NODE_NAME: ${NODE_NAME:?Set NODE_NAME to a unique stable name for this application replica}
      PAYMENT_MULTI_NODE_ENABLED: ${PAYMENT_MULTI_NODE_ENABLED:-false}
      PAYMENT_CLUSTER_ID: ${PAYMENT_CLUSTER_ID:-}
      PAYMENT_CLUSTER_NODES: ${PAYMENT_CLUSTER_NODES:-}
      PAYMENT_CLUSTER_MIN_LIVE_NODES: ${PAYMENT_CLUSTER_MIN_LIVE_NODES:-2}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-}
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD to an independent openssl rand -hex 32 value}
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET to an independent openssl rand -hex 32 value}
      CRYPTO_SECRET: ${CRYPTO_SECRET:?Set CRYPTO_SECRET to an independent openssl rand -hex 32 value}
      PAYMENT_SECRET_KEY: ${PAYMENT_SECRET_KEY:?Set PAYMENT_SECRET_KEY to an independent openssl rand -hex 32 value}
      PAYMENT_SECRET_KEY_PREVIOUS: ${PAYMENT_SECRET_KEY_PREVIOUS:-}
    command:
      - /bin/sh
      - -ec
      - |
        require_strong_secret() {
          name=$$1
          value=$$2
          if [ "$${#value}" -lt 32 ] ||
             printf '%s' "$$value" | grep -Eiq '(123456|password|changeme|random_string|replace(_with|_me)?|placeholder|example)' ||
             printf '%s' "$$value" | grep -Eq '[[:space:]]' ||
             [ "$$(printf '%s' "$$value" | fold -w 1 | sort -u | wc -l | tr -d ' ')" -lt 8 ]; then
            echo "$$name must contain at least 32 non-whitespace characters, no placeholder text, and at least 8 distinct characters" >&2
            exit 1
          fi
        }
        require_distinct() {
          first_name=$$1
          first_value=$$2
          second_name=$$3
          second_value=$$4
          if [ "$$first_value" = "$$second_value" ]; then
            echo "$$first_name and $$second_name must not reuse the same secret" >&2
            exit 1
          fi
        }
        if ! printf '%s' "$$NEW_API_IMAGE" |
          grep -Eq '^ghcr\.io/liulixin-lex/xy-api@sha256:[0-9a-f]{64}$$'; then
          echo 'NEW_API_IMAGE must be the exact GHCR sha256 digest reference recorded in container-images.json' >&2
          exit 1
        fi
        if ! printf '%s' "$$NODE_NAME" | grep -Eq '^[A-Za-z0-9][A-Za-z0-9._-]{0,90}$$'; then
          echo 'NODE_NAME must be a unique stable 1-91 character replica name using letters, numbers, dot, underscore, or hyphen' >&2
          exit 1
        fi
        case "$$PAYMENT_MULTI_NODE_ENABLED" in
          true|false) ;;
          *) echo 'PAYMENT_MULTI_NODE_ENABLED must be true or false' >&2; exit 1 ;;
        esac
        if [ "$$PAYMENT_MULTI_NODE_ENABLED" = true ]; then
          if ! printf '%s' "$$PAYMENT_CLUSTER_ID" | grep -Eq '^[A-Za-z0-9][A-Za-z0-9._-]{0,90}$$'; then
            echo 'PAYMENT_CLUSTER_ID must be a stable 1-91 character cluster name' >&2
            exit 1
          fi
          if [ -z "$$PAYMENT_CLUSTER_NODES" ] || printf '%s' "$$PAYMENT_CLUSTER_NODES" | grep -Eq '(^,|,$|,,|[[:space:]])'; then
            echo 'PAYMENT_CLUSTER_NODES must be a comma-separated list of stable NODE_NAME values without spaces' >&2
            exit 1
          fi
          cluster_node_count=0
          cluster_node_seen=,
          local_node_expected=false
          for cluster_node in $$(printf '%s' "$$PAYMENT_CLUSTER_NODES" | tr ',' ' '); do
            if ! printf '%s' "$$cluster_node" | grep -Eq '^[A-Za-z0-9][A-Za-z0-9._-]{0,90}$$'; then
              echo "invalid PAYMENT_CLUSTER_NODES member: $$cluster_node" >&2
              exit 1
            fi
            case "$$cluster_node_seen" in
              *,"$$cluster_node",*) echo "duplicate PAYMENT_CLUSTER_NODES member: $$cluster_node" >&2; exit 1 ;;
            esac
            cluster_node_seen="$${cluster_node_seen}$${cluster_node},"
            cluster_node_count=$$((cluster_node_count + 1))
            if [ "$$cluster_node" = "$$NODE_NAME" ]; then
              local_node_expected=true
            fi
          done
          if [ "$$cluster_node_count" -lt 2 ] || [ "$$cluster_node_count" -gt 64 ]; then
            echo 'PAYMENT_CLUSTER_NODES must contain between 2 and 64 unique nodes' >&2
            exit 1
          fi
          if [ "$$local_node_expected" != true ]; then
            echo 'PAYMENT_CLUSTER_NODES must include this replica NODE_NAME' >&2
            exit 1
          fi
          case "$$PAYMENT_CLUSTER_MIN_LIVE_NODES" in
            ''|*[!0-9]*) echo 'PAYMENT_CLUSTER_MIN_LIVE_NODES must be an integer' >&2; exit 1 ;;
          esac
          cluster_quorum=$$((cluster_node_count / 2 + 1))
          if [ "$$PAYMENT_CLUSTER_MIN_LIVE_NODES" -lt "$$cluster_quorum" ] || [ "$$PAYMENT_CLUSTER_MIN_LIVE_NODES" -gt "$$cluster_node_count" ]; then
            echo 'PAYMENT_CLUSTER_MIN_LIVE_NODES must be a strict majority and no greater than the configured node count' >&2
            exit 1
          fi
        fi
        if [ -z "$$POSTGRES_PASSWORD" ] && [ -z "$$MYSQL_ROOT_PASSWORD" ]; then
          echo 'Set the password for the active PostgreSQL or MySQL database service' >&2
          exit 1
        fi
        require_strong_secret REDIS_PASSWORD "$$REDIS_PASSWORD"
        require_strong_secret SESSION_SECRET "$$SESSION_SECRET"
        require_strong_secret CRYPTO_SECRET "$$CRYPTO_SECRET"
        require_strong_secret PAYMENT_SECRET_KEY "$$PAYMENT_SECRET_KEY"
        if [ -n "$$PAYMENT_SECRET_KEY_PREVIOUS" ]; then
          require_strong_secret PAYMENT_SECRET_KEY_PREVIOUS "$$PAYMENT_SECRET_KEY_PREVIOUS"
          require_distinct PAYMENT_SECRET_KEY "$$PAYMENT_SECRET_KEY" PAYMENT_SECRET_KEY_PREVIOUS "$$PAYMENT_SECRET_KEY_PREVIOUS"
          require_distinct REDIS_PASSWORD "$$REDIS_PASSWORD" PAYMENT_SECRET_KEY_PREVIOUS "$$PAYMENT_SECRET_KEY_PREVIOUS"
          require_distinct SESSION_SECRET "$$SESSION_SECRET" PAYMENT_SECRET_KEY_PREVIOUS "$$PAYMENT_SECRET_KEY_PREVIOUS"
          require_distinct CRYPTO_SECRET "$$CRYPTO_SECRET" PAYMENT_SECRET_KEY_PREVIOUS "$$PAYMENT_SECRET_KEY_PREVIOUS"
          if [ -n "$$POSTGRES_PASSWORD" ]; then
            require_distinct POSTGRES_PASSWORD "$$POSTGRES_PASSWORD" PAYMENT_SECRET_KEY_PREVIOUS "$$PAYMENT_SECRET_KEY_PREVIOUS"
          fi
          if [ -n "$$MYSQL_ROOT_PASSWORD" ]; then
            require_distinct MYSQL_ROOT_PASSWORD "$$MYSQL_ROOT_PASSWORD" PAYMENT_SECRET_KEY_PREVIOUS "$$PAYMENT_SECRET_KEY_PREVIOUS"
          fi
        fi
        if [ -n "$$POSTGRES_PASSWORD" ]; then
          require_strong_secret POSTGRES_PASSWORD "$$POSTGRES_PASSWORD"
          require_distinct POSTGRES_PASSWORD "$$POSTGRES_PASSWORD" REDIS_PASSWORD "$$REDIS_PASSWORD"
          require_distinct POSTGRES_PASSWORD "$$POSTGRES_PASSWORD" SESSION_SECRET "$$SESSION_SECRET"
          require_distinct POSTGRES_PASSWORD "$$POSTGRES_PASSWORD" CRYPTO_SECRET "$$CRYPTO_SECRET"
          require_distinct POSTGRES_PASSWORD "$$POSTGRES_PASSWORD" PAYMENT_SECRET_KEY "$$PAYMENT_SECRET_KEY"
        fi
        if [ -n "$$MYSQL_ROOT_PASSWORD" ]; then
          require_strong_secret MYSQL_ROOT_PASSWORD "$$MYSQL_ROOT_PASSWORD"
          require_distinct MYSQL_ROOT_PASSWORD "$$MYSQL_ROOT_PASSWORD" REDIS_PASSWORD "$$REDIS_PASSWORD"
          require_distinct MYSQL_ROOT_PASSWORD "$$MYSQL_ROOT_PASSWORD" SESSION_SECRET "$$SESSION_SECRET"
          require_distinct MYSQL_ROOT_PASSWORD "$$MYSQL_ROOT_PASSWORD" CRYPTO_SECRET "$$CRYPTO_SECRET"
          require_distinct MYSQL_ROOT_PASSWORD "$$MYSQL_ROOT_PASSWORD" PAYMENT_SECRET_KEY "$$PAYMENT_SECRET_KEY"
        fi
        if [ -n "$$POSTGRES_PASSWORD" ] && [ -n "$$MYSQL_ROOT_PASSWORD" ]; then
          require_distinct POSTGRES_PASSWORD "$$POSTGRES_PASSWORD" MYSQL_ROOT_PASSWORD "$$MYSQL_ROOT_PASSWORD"
        fi
        require_distinct REDIS_PASSWORD "$$REDIS_PASSWORD" SESSION_SECRET "$$SESSION_SECRET"
        require_distinct REDIS_PASSWORD "$$REDIS_PASSWORD" CRYPTO_SECRET "$$CRYPTO_SECRET"
        require_distinct REDIS_PASSWORD "$$REDIS_PASSWORD" PAYMENT_SECRET_KEY "$$PAYMENT_SECRET_KEY"
        require_distinct SESSION_SECRET "$$SESSION_SECRET" PAYMENT_SECRET_KEY "$$PAYMENT_SECRET_KEY"
        require_distinct CRYPTO_SECRET "$$CRYPTO_SECRET" PAYMENT_SECRET_KEY "$$PAYMENT_SECRET_KEY"
        echo 'Compose production configuration passed fail-closed validation.'

  new-api:
    image: ${NEW_API_IMAGE:?Set NEW_API_IMAGE to the verified v0.2.2 digest reference from container-images.json}
    restart: always
    command: --log-dir /app/logs
    ports:
      - "${NEW_API_PORT:-3000}:3000"
    volumes:
      - ./data:/data
      - ./logs:/app/logs
    environment:
      SQL_DSN: postgresql://root:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD to an independent openssl rand -hex 32 value}@postgres:5432/new-api
#      SQL_DSN: root:${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD to an independent openssl rand -hex 32 value}@tcp(mysql:3306)/new-api  # Point to the mysql service, uncomment if using MySQL
#      LOG_SQL_DSN: postgresql://root:${POSTGRES_LOG_PASSWORD:?Set POSTGRES_LOG_PASSWORD}@postgres-log:5432/new-api-log # OPTIONAL: Use a separate PostgreSQL log database/service
#      LOG_SQL_DSN: clickhouse://default:${CLICKHOUSE_PASSWORD:?Set CLICKHOUSE_PASSWORD}@clickhouse:9000/new_api_logs # OPTIONAL: Also uncomment clickhouse below
#      LOG_SQL_CLICKHOUSE_TTL_DAYS: 0 # OPTIONAL: Unset or 0 disables automatic deletion; set to e.g. 30 to keep 30 days
      REDIS_CONN_STRING: redis://:${REDIS_PASSWORD:?Set REDIS_PASSWORD to an independent openssl rand -hex 32 value}@redis:6379
      TZ: Asia/Shanghai
      ERROR_LOG_ENABLED: "true" # 是否启用错误日志记录 (Whether to enable error log recording)
      BATCH_UPDATE_ENABLED: "true" # 是否启用批量更新 (Whether to enable batch update)
      # 本 Compose 文件定义一个应用副本。多节点部署必须为每个副本分别注入唯一且稳定的值；
      # 不要用同一 NODE_NAME 直接 scale 此 service，重复身份会让支付创建安全地停止。
      # 现有单节点可继续使用 new-api-node-1；多节点时每个副本必须改为不同名称。
      # This Compose file defines one application replica. Inject a different stable value for every replica;
      # do not scale this service with one shared NODE_NAME because duplicate identity intentionally fails payment readiness.
      NODE_NAME: ${NODE_NAME:?Set NODE_NAME to a unique stable name for this application replica}
      # 单节点保持 false。多节点必须在所有副本使用相同的 cluster ID、节点 allowlist 和最小在线数。
      # Keep false for a single node. Every multi-node replica must share the same cluster ID, node allowlist, and minimum live count.
      PAYMENT_MULTI_NODE_ENABLED: ${PAYMENT_MULTI_NODE_ENABLED:-false}
      PAYMENT_CLUSTER_ID: ${PAYMENT_CLUSTER_ID:-}
      PAYMENT_CLUSTER_NODES: ${PAYMENT_CLUSTER_NODES:-}
      PAYMENT_CLUSTER_MIN_LIVE_NODES: ${PAYMENT_CLUSTER_MIN_LIVE_NODES:-2}
      # 全新生产安装应在 .env 中设置独立随机值且所有节点一致；经支持的 v0.2.0 路径升级时必须保留旧值
      # 若旧环境未设置 CRYPTO_SECRET，后端曾使用 SESSION_SECRET；不要在未清理本应用 Redis 缓存并协调所有节点时引入新值
      # Clean production installs should use independent random values in .env on every node; upgrades through the supported v0.2.0 path must preserve the old values
      # If CRYPTO_SECRET was unset, SESSION_SECRET was the legacy key; do not introduce a new value without clearing this app's Redis cache and coordinating every node
      SESSION_SECRET: ${SESSION_SECRET:?Set SESSION_SECRET to an independent openssl rand -hex 32 value}
      CRYPTO_SECRET: ${CRYPTO_SECRET:?Set CRYPTO_SECRET to an independent openssl rand -hex 32 value}
      # 支付凭据密钥是 Compose 生产基线的必填项，即使当前尚未启用网关也不使用临时值
      # The payment credential key is required by this production baseline even before a gateway is enabled; never generate it per start
      PAYMENT_SECRET_KEY: ${PAYMENT_SECRET_KEY:?Set PAYMENT_SECRET_KEY to an independent openssl rand -hex 32 value}
      # 仅在显式轮换支付密钥时临时设置，完成凭证重加密后从 .env 删除
      # Set only during an explicit payment-key rotation; remove it from .env after credentials are re-encrypted
      PAYMENT_SECRET_KEY_PREVIOUS: ${PAYMENT_SECRET_KEY_PREVIOUS:-}
#      STREAMING_TIMEOUT: 300  # 流模式无响应超时时间，单位秒，默认120秒，如果出现空补全可以尝试改为更大值 （Streaming timeout in seconds, default is 120s. Increase if experiencing empty completions）
#      RELAY_IDLE_CONN_TIMEOUT: 90  # Relay HTTP 客户端空闲连接超时时间，单位秒，默认跟随 Go 标准库，设置为0表示不限制 (Relay HTTP client idle keep-alive timeout in seconds, defaults to Go standard library; set 0 to disable)
#      SESSION_COOKIE_SECURE: "true"  # 启用 Secure session cookie，必须同时配置 SESSION_COOKIE_TRUSTED_URL (Enable Secure session cookies; requires SESSION_COOKIE_TRUSTED_URL)
#      SESSION_COOKIE_TRUSTED_URL: https://example.com,https://admin.example.com  # 可信 HTTPS 入口地址，多个用英文逗号分隔 (Trusted HTTPS entry URLs, comma-separated)
#      SYNC_FREQUENCY: 60  # Uncomment if regular database syncing is needed
#      GOOGLE_ANALYTICS_ID: G-XXXXXXXXXX  # Google Analytics 的测量 ID (Google Analytics Measurement ID)
#      UMAMI_WEBSITE_ID: xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx  # Umami 网站 ID (Umami Website ID)
#      UMAMI_SCRIPT_URL: https://analytics.umami.is/script.js  # Umami 脚本 URL，默认为官方地址 (Umami Script URL, defaults to official URL)

    depends_on:
      config-check:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
#      mysql:  # Uncomment if using MySQL
#        condition: service_healthy
#      clickhouse:  # Uncomment if using ClickHouse for LOG_SQL_DSN
#        condition: service_healthy
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://localhost:3000/api/readiness | grep -Eq '\"status\":[[:space:]]*\"ready\"' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3

  redis:
    image: redis:7.4.9-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    restart: always
    depends_on:
      config-check:
        condition: service_completed_successfully
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?Set REDIS_PASSWORD to an independent openssl rand -hex 32 value}
    command: ["/bin/sh", "-ec", "exec redis-server --requirepass \"$$REDIS_PASSWORD\""]
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$$REDIS_PASSWORD\" redis-cli ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:15.18@sha256:74e110c41804365e3915fcc09d5e7a1eff50161aaa94d5da0e58e0cd75ae509c
    restart: always
    depends_on:
      config-check:
        condition: service_completed_successfully
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD to an independent openssl rand -hex 32 value}
      POSTGRES_DB: new-api
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - new-api-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d new-api"]
      interval: 10s
      timeout: 5s
      retries: 5
#    ports:
#      - "5432:5432"  # Uncomment if you need to access PostgreSQL from outside Docker

#  mysql:
#    image: mysql:8.4.10@sha256:c592c15aaf4a1961e15d82eb31ea5987dda862d1c4b1e93424438c0e91dc1f8d
#    restart: always
#    depends_on:
#      config-check:
#        condition: service_completed_successfully
#    environment:
#      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD to an independent openssl rand -hex 32 value}
#      MYSQL_DATABASE: new-api
#    volumes:
#      - mysql_data:/var/lib/mysql
#    networks:
#      - new-api-network
